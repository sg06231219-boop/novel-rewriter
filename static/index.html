<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a14">
<meta name="description" content="小说翻改工具：AI驱动的小说文本改写平台，支持名称批量替换、句式改写、智能提取专有名词、对照预览，书库管理。">
<meta name="keywords" content="小说翻改,AI改写,文本改写,名称替换,句式改写,书库管理">
<meta property="og:title" content="小说翻改工具">
<meta property="og:description" content="AI驱动的小说文本改写平台，支持名称替换、句式改写、对照预览">
<meta property="og:image" content="https://novel-rewriter.onrender.com/static/og-image.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<title>小说翻改工具 v6.2</title>
<link rel="manifest" href="/static/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a14;--sf:#12121e;--sf2:#1a1a2e;--sf3:#222240;--bd:#2a2a4a;
  --tx:#e0e0e0;--tx2:#999;--tx3:#555;
  --pm:#7c5cfc;--pm2:#5a3fd6;--pmbg:rgba(124,92,252,.1);
  --ac:#ff6b9d;--ok:#4ecdc4;--wn:#ffe66d;--dg:#ff6b6b}
.light{
  --bg:#f5f5fa;--sf:#fff;--sf2:#f0f0f5;--sf3:#e5e5ef;--bd:#d0d0da;
  --tx:#1a1a2e;--tx2:#666;--tx3:#999}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;transition:background .3s,color .3s}
.app{display:flex;flex-direction:column;height:100vh}

/* 顶栏 */
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar h1{font-size:1.1em;background:linear-gradient(135deg,var(--pm),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .ver{font-size:.55em;padding:2px 6px;background:var(--pm);border-radius:10px;color:#fff}
.topbar-right{margin-left:auto;display:flex;gap:4px;align-items:center}
.topbar-right .btn{padding:5px 10px;font-size:11px}

/* 对比模式切换 */
.view-modes{display:flex;gap:2px;background:var(--sf3);border-radius:5px;padding:2px}
.view-modes .vm{padding:3px 8px;border:none;background:none;color:var(--tx3);font-size:10px;cursor:pointer;border-radius:3px;transition:all .15s}
.view-modes .vm.on{background:var(--pm);color:#fff}

/* 通用按钮 */
.btn{padding:6px 12px;border:none;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;font-weight:500;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--pm),var(--pm2));color:#fff}
.btn-p:hover{box-shadow:0 3px 10px rgba(124,92,252,.4)}
.btn-g{background:var(--sf3);color:var(--tx);border:1px solid var(--bd)}
.btn-g:hover{background:var(--bd)}
.btn-a{background:linear-gradient(135deg,var(--ac),#ff4d8a);color:#fff}
.btn-ok{background:var(--ok);color:var(--bg)}
.btn-d{background:var(--dg);color:#fff}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-xs{padding:2px 6px;font-size:10px;border-radius:4px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* 三栏 */
.main{flex:1;display:flex;overflow:hidden}

/* 左栏 书库 */
.panel-l{width:240px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
.panel-l.hide{width:0;overflow:hidden;border:none}
.ph{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ph h2{font-size:.8em}
.pb{flex:1;overflow-y:auto;padding:4px}

.book-search{padding:4px 6px}
.book-search input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;color:var(--tx);font-size:11px}
.book-search input:focus{outline:none;border-color:var(--pm)}
.book-search select{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:3px 5px;color:var(--tx);font-size:10px;margin-top:3px}

.bk{padding:6px 8px;border-radius:5px;cursor:pointer;margin-bottom:1px;transition:background .12s;display:flex;align-items:center;gap:6px}
.bk:hover{background:var(--sf3)}
.bk.on{background:var(--pmbg);border-left:3px solid var(--pm)}
.bk .bi{font-size:1em}
.bk .bn{flex:1;min-width:0;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk .bm{font-size:9px;color:var(--tx3)}
.bk .bx{opacity:0;color:var(--tx3);cursor:pointer;font-size:13px;padding:0 3px;flex-shrink:0}
.bk:hover .bx{opacity:1}
.bk .bx:hover{color:var(--dg)}

.ch{padding:4px 8px 4px 32px;border-radius:3px;cursor:pointer;font-size:10px;color:var(--tx2);transition:all .12s;margin-bottom:1px;display:flex;align-items:center;justify-content:space-between}
.ch:hover{background:var(--sf3);color:var(--tx)}
.ch.on{color:var(--pm);background:var(--pmbg)}
.ch.editing{color:var(--wn);background:rgba(255,230,109,.15);border-left:3px solid var(--wn)}
.ch .ch-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch .ch-x{opacity:0;color:var(--dg);font-size:12px;margin-left:4px;cursor:pointer}
.ch:hover .ch-x{opacity:1}

/* 拖拽 */
.ch[draggable=true]{cursor:grab}
.ch.dragging{opacity:.4;background:var(--sf3)}
.ch.drag-over{background:var(--pmbg);border-top:2px solid var(--pm)}
.ch.drag-over::before{content:'';position:absolute;top:-2px;left:0;right:0;height:2px;background:var(--pm)}

.ch-add{padding:4px 8px 4px 32px;border-radius:3px;cursor:pointer;font-size:10px;color:var(--pm);text-align:center}

/* 中栏 规则 */
.panel-m{width:260px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}

.rc{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 6px;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.rc:hover{border-color:var(--pm)}
.rc .ar{color:var(--pm);font-weight:bold;font-size:12px}
.rc input{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:3px 6px;color:var(--tx);font-size:11px;min-width:0}
.rc input:focus{outline:none;border-color:var(--pm)}
.rc .dx{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;padding:0 2px}
.rc .dx:hover{color:var(--dg)}

.tag{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:bold;margin-right:2px}
.tag-p{background:rgba(78,205,196,.15);color:var(--ok)}
.tag-l{background:rgba(255,230,109,.15);color:var(--wn)}
.tag-o{background:rgba(124,92,252,.15);color:var(--pm)}
.tag-i{background:rgba(255,107,157,.15);color:var(--ac)}

.ep{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:8px;margin-top:6px;display:none}
.ep.show{display:block}
.ep h3{font-size:.7em;color:var(--tx2);margin-bottom:5px}
.nc{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;margin:2px;cursor:pointer;transition:all .12s;border:1px solid var(--bd);background:var(--bg)}
.nc:hover{border-color:var(--pm);background:var(--pmbg)}
.nc.sel{border-color:var(--pm);background:rgba(124,92,252,.25)}

.tp-item{padding:4px 6px;border-radius:3px;cursor:pointer;font-size:10px;color:var(--tx2);display:flex;align-items:center;justify-content:space-between;margin-bottom:1px}
.tp-item:hover{background:var(--sf3);color:var(--tx)}

/* 右栏 编辑器 */
.panel-r{flex:1;display:flex;flex-direction:column;overflow:hidden}

.toolbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:5px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.toolbar .sep{width:1px;height:14px;background:var(--bd)}
.toolbar label{font-size:10px;color:var(--tx2);display:flex;align-items:center;gap:3px;cursor:pointer}
.toolbar select{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:2px 5px;color:var(--tx);font-size:10px}
.toolbar select:focus{outline:none;border-color:var(--pm)}
.toolbar input[type=checkbox]{accent-color:var(--pm)}
.toolbar .counter{margin-left:auto;font-size:10px;color:var(--tx3)}
.toolbar .font-ctrl{display:flex;align-items:center;gap:2px}
.toolbar .font-btn{width:20px;height:20px;border:1px solid var(--bd);background:var(--bg);border-radius:3px;cursor:pointer;color:var(--tx);font-size:12px;display:flex;align-items:center;justify-content:center}
.toolbar .font-btn:hover{background:var(--sf3)}

.cmp{flex:1;display:flex;overflow:hidden}
.cmp-p{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.cmp-p+.cmp-p{border-left:1px solid var(--bd)}
.cmp-h{padding:5px 10px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:10px;color:var(--tx2);display:flex;align-items:center;gap:5px;position:relative}
.cmp-h .dot{width:5px;height:5px;border-radius:50%}
.cmp-b{flex:1;overflow-y:auto;padding:10px}
textarea.ed{width:100%;height:100%;background:var(--bg);border:none;color:var(--tx);font-size:13px;line-height:1.9;resize:none;font-family:inherit;transition:font-size .2s}
textarea.ed:focus{outline:none}
.result{font-size:13px;line-height:1.9;white-space:pre-wrap;word-break:break-all;transition:font-size .2s}
.diff-new{background:rgba(78,205,196,.2);color:var(--ok);border-radius:2px;padding:0 1px}

.cmp-btn{position:absolute;top:4px;padding:2px 6px;background:var(--sf3);border:1px solid var(--bd);border-radius:4px;color:var(--tx2);font-size:9px;cursor:pointer;opacity:0;transition:opacity .2s;z-index:2}
.cmp-h:hover .cmp-btn{opacity:1}
.cmp-btn:hover{background:var(--pm);color:#fff;border-color:var(--pm)}
.cmp-btn.ok:hover{background:var(--ok);border-color:var(--ok)}
.cmp-btn.wn:hover{background:var(--wn);border-color:var(--wn);color:var(--bg)}
.copy-btn{right:6px}
.save-ch-btn{right:60px}
.apply-btn{right:6px}

/* 搜索高亮 */
.search-hl{background:rgba(255,230,109,.4);color:var(--wn);border-radius:2px;padding:0 2px;font-weight:bold}

/* 移动端适配 */
@media (max-width:900px){
  .panel-l{width:200px}
  .panel-m{width:220px}
}
@media (max-width:700px){
  .main{flex-direction:column}
  .panel-l,.panel-m{width:100%;border-right:none;border-bottom:1px solid var(--bd);max-height:35vh}
  .panel-l.hide,.panel-m.hide{max-height:0;border:none}
  .cmp{flex-direction:column}
  .cmp-p{flex:1;min-height:0}
  .cmp-p+.cmp-p{border-left:none;border-top:1px solid var(--bd)}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="btn btn-g btn-xs" onclick="togglePanel('panelL')" title="书库">📚</button>
    <h1>📖 小说翻改</h1><span class="ver" id="verBadge">v6.1</span>
    <div class="view-modes">
      <button class="vm on" onclick="setViewMode('both')" id="vmBoth">并排</button>
      <button class="vm" onclick="setViewMode('orig')" id="vmOrig">原文</button>
      <button class="vm" onclick="setViewMode('result')" id="vmResult">结果</button>
    </div>
    <div class="topbar-right">
      <button class="btn btn-g btn-xs" onclick="toggleTheme()" id="themeBtn" title="主题">🌙</button>
      <button class="btn btn-g btn-xs" onclick="showModal('apiModal')" title="API设置">🔑</button>
      <button class="btn btn-g btn-xs" onclick="downloadResult()" title="下载">💾</button>
      <button class="btn btn-g btn-xs" onclick="importFile()" title="导入文件">📁</button>
      <input type="file" id="fileInput" accept=".txt,.md,.text" style="display:none" onchange="handleFile(event)">
    </div>
  </div>

  <div class="main">
    <!-- 左栏 书库 -->
    <div class="panel-l" id="panelL">
      <div class="ph"><h2>📚 书库</h2><button class="btn btn-p btn-xs" onclick="showModal('addBookModal')">+ 新书</button></div>
      <div class="book-search">
        <input id="bookSearch" placeholder="搜索书名/作者..." oninput="handleSearch()">
        <select id="searchScope" onchange="handleSearch()">
          <option value="title">书名搜索</option>
          <option value="content">内容搜索</option>
        </select>
      </div>
      <div class="pb" id="bookList"></div>
    </div>

    <!-- 中栏 规则 -->
    <div class="panel-m" id="panelM">
      <div class="ph">
        <h2>🔄 替换规则</h2>
        <div style="display:flex;gap:2px">
          <button class="btn btn-g btn-xs" onclick="toggleBatch()" title="批量">📝</button>
          <button class="btn btn-g btn-xs" onclick="showModal('saveTpModal')" title="模板">💾</button>
          <button class="btn btn-g btn-xs" onclick="clearRules()" title="清空">🗑️</button>
          <button class="btn btn-p btn-xs" onclick="addRule()">+</button>
        </div>
      </div>
      <div class="pb">
        <div class="batch-area" id="batchArea">
          <textarea id="batchInput" placeholder="每行一条：原名→新名&#10;萧炎→林焱&#10;药老→魂老"></textarea>
          <p>用 → 或 = 分隔</p>
          <button class="btn btn-p btn-sm" onclick="parseBatch()" style="width:100%;margin-top:3px">批量添加</button>
        </div>
        <div id="rulesBox"></div>
        <div style="margin-top:6px">
          <button class="btn btn-a btn-sm" onclick="extractNames()" style="width:100%">🧠 智能提取名称</button>
        </div>
        <div class="ep" id="extPanel">
          <h3>提取结果（点击添加）</h3>
          <div id="extResults"></div>
        </div>
        <div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--bd)">
          <div style="font-size:.7em;color:var(--tx2);margin-bottom:3px">📦 模板</div>
          <div id="tpList"></div>
        </div>
      </div>
      <div style="padding:6px;border-top:1px solid var(--bd)">
        <button class="btn btn-p" onclick="doRewrite()" id="rewriteBtn" style="width:100%;padding:8px;font-size:12px">🚀 开始翻改</button>
        <button class="btn btn-a" onclick="rewriteBookStream()" id="rewriteBookBtn" style="width:100%;padding:8px;font-size:12px;margin-top:3px">📚 整本翻改(流式)</button>
        <div id="bookRewriteProgress" style="display:none;margin-top:4px">
          <div style="background:var(--sf2);border-radius:4px;overflow:hidden;height:16px;position:relative">
            <div id="brProgress" style="background:linear-gradient(90deg,var(--pm),var(--ac));height:100%;width:0;transition:width .3s"></div>
            <span id="brProgressText" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">0%</span>
          </div>
          <div id="brStatus" style="font-size:9px;color:var(--tx3);text-align:center;margin-top:2px"></div>
        </div>
      </div>
    </div>

    <!-- 右栏 编辑器 -->
    <div class="panel-r">
      <div class="toolbar">
        <label><input type="checkbox" id="useAi" onchange="toggleAi()"> AI改写</label>
        <div class="sep" id="aiSep" style="display:none"></div>
        <label id="aiPrvLbl" style="display:none">后端 <select id="aiProvider"><option value="zhipu">智谱</option><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option></select></label>
        <label id="aiLvLbl" style="display:none">强度 <select id="aiLv"><option value="light">轻微</option><option value="medium" selected>中等</option><option value="heavy">大幅</option></select></label>
        <div class="sep"></div>
        <div class="font-ctrl">
          <button class="font-btn" onclick="changeFontSize(-1)" title="减小字体">−</button>
          <span id="fontSizeVal" style="font-size:10px;color:var(--tx2);min-width:28px;text-align:center">13px</span>
          <button class="font-btn" onclick="changeFontSize(1)" title="增大字体">+</button>
        </div>
        <div class="counter">原文 <span id="cntO">0</span> 字 → 改写 <span id="cntR">0</span> 字</div>
      </div>
      <div class="cmp" id="cmpContainer">
        <div class="cmp-p" id="cmpOrig">
          <div class="cmp-h">
            <div class="dot" style="background:var(--wn)"></div>
            <span id="origTitle">原文</span>
            <button class="cmp-btn copy-btn" onclick="copyText('origText')">📋 复制</button>
            <button class="cmp-btn save-ch-btn" id="saveChBtn" onclick="saveChapterContent()" style="display:none;right:60px" title="保存到章节">💾 保存</button>
          </div>
          <div class="cmp-b" id="origScroll"><textarea class="ed" id="origText" placeholder="粘贴原文或从书库加载..." oninput="updateCnt();saveDraft()"></textarea></div>
        </div>
        <div class="cmp-p" id="cmpResult">
          <div class="cmp-h">
            <div class="dot" style="background:var(--ok)"></div>
            <span id="repInfo">结果</span>
            <button class="cmp-btn apply-btn ok" id="applyBtn" onclick="applyResultToChapter()" style="display:none" title="应用到章节">✅ 应用</button>
            <button class="cmp-btn copy-btn" onclick="copyResult()">📋 复制</button>
          </div>
          <div class="cmp-b" id="resultScroll"><div class="result" id="resultText">等待翻改...</div></div>
        </div>
      </div>
      <div class="sbar">
        <div>规则: <span class="v" id="sRules">0</span></div>
        <div>替换: <span class="v" id="sReps">0</span></div>
        <div id="sAi" style="display:none">AI: <span class="v">开启</span></div>
        <label style="margin-left:auto"><input type="checkbox" id="syncScrollCb" checked onchange="toggleSyncScroll()"> 同步滚动</label>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="ld-bg" id="ldBg"><div class="spin"></div><div class="ld-text" id="ldText">处理中...</div></div>

<!-- API Key -->
<div class="modal-bg" id="apiModal">
  <div class="modal">
    <h2>🔑 API 设置</h2>
    <p>AI改写需要API Key。<a href="https://open.bigmodel.cn" target="_blank" style="color:var(--pm)">智谱</a> <a href="https://platform.deepseek.com" target="_blank" style="color:var(--pm)">DeepSeek</a></p>
    <select id="apiKeyProvider" onchange="loadApiKey()">
      <option value="zhipu">智谱 API Key</option>
      <option value="deepseek">DeepSeek API Key</option>
      <option value="openai">OpenAI API Key</option>
    </select>
    <input type="text" id="apiKeyIn" placeholder="输入 API Key">
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('apiModal')">取消</button><button class="btn btn-p" onclick="saveApiKey()">保存</button></div>
  </div>
</div>

<!-- 新建书籍 -->
<div class="modal-bg" id="addBookModal">
  <div class="modal">
    <h2>📚 新建书籍</h2>
    <input type="text" id="newBookTitle" placeholder="书名">
    <input type="text" id="newBookAuthor" placeholder="作者（选填）">
    <textarea id="newBookContent" placeholder="第一章内容（选填）"></textarea>
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('addBookModal')">取消</button><button class="btn btn-p" onclick="createBook()">创建</button></div>
  </div>
</div>

<!-- 添加章节 -->
<div class="modal-bg" id="addChModal">
  <div class="modal">
    <h2>📝 添加章节</h2>
    <input type="text" id="newChTitle" placeholder="章节标题">
    <textarea id="newChContent" placeholder="章节内容"></textarea>
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('addChModal')">取消</button><button class="btn btn-p" onclick="addChapter()">添加</button></div>
  </div>
</div>

<!-- 保存模板 -->
<div class="modal-bg" id="saveTpModal">
  <div class="modal">
    <h2>💾 保存模板</h2>
    <input type="text" id="tpName" placeholder="模板名称">
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('saveTpModal')">取消</button><button class="btn btn-p" onclick="saveTemplate()">保存</button></div>
  </div>
</div>

<!-- 确认删除 -->
<div class="modal-bg" id="confirmModal">
  <div class="modal">
    <h2>⚠️ 确认删除</h2>
    <p id="confirmText">确定要删除吗？</p>
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('confirmModal')">取消</button><button class="btn btn-d" id="confirmBtn">删除</button></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let curBook = null, curCh = null, currentBookData = null;
let allBooks = [];
let lastRewriteData = null;
let fontSize = 13;
let extractedNames = {};
let syncScrollEnabled = true;
let bookRewriteResult = null;
let viewMode = 'both';
let isStreaming = false;
let currentChTitle = null;

// ===== 初始化 =====
async function init() {
  addRule();
  await loadBooks();
  await loadTemplates();
  loadTheme();
  loadFontSize();
  loadDraft();
  updateCnt();
  loadApiKey();
  setupSyncScroll();
  fetchVersion();
  registerSW();
  updateEditorButtons();
}

// ===== PWA =====
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
  }
}

// ===== 对比模式切换 =====
function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.vm').forEach(b => b.classList.remove('on'));
  document.getElementById('vmBoth').classList.toggle('on', mode==='both');
  document.getElementById('vmOrig').classList.toggle('on', mode==='orig');
  document.getElementById('vmResult').classList.toggle('on', mode==='result');
  const cmpOrig = document.getElementById('cmpOrig');
  const cmpResult = document.getElementById('cmpResult');
  if (mode === 'both') {
    cmpOrig.style.display = 'flex';
    cmpResult.style.display = 'flex';
  } else if (mode === 'orig') {
    cmpOrig.style.display = 'flex';
    cmpResult.style.display = 'none';
  } else {
    cmpOrig.style.display = 'none';
    cmpResult.style.display = 'flex';
  }
}

// ===== 主题 =====
function loadTheme() {
  const t = localStorage.getItem('nr_theme') || 'dark';
  document.body.classList.toggle('light', t === 'light');
  document.getElementById('themeBtn').textContent = t === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('nr_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
}

// ===== 字体大小 =====
function loadFontSize() {
  fontSize = parseInt(localStorage.getItem('nr_fontsize') || '13');
  applyFontSize();
}
function changeFontSize(delta) {
  fontSize = Math.max(10, Math.min(24, fontSize + delta));
  localStorage.setItem('nr_fontsize', fontSize);
  applyFontSize();
}
function applyFontSize() {
  document.getElementById('origText').style.fontSize = fontSize + 'px';
  document.getElementById('resultText').style.fontSize = fontSize + 'px';
  document.getElementById('fontSizeVal').textContent = fontSize + 'px';
}

// ===== 本地暂存 =====
function saveDraft() {
  localStorage.setItem('nr_draft', document.getElementById('origText').value);
}
function loadDraft() {
  const d = localStorage.getItem('nr_draft');
  if (d) document.getElementById('origText').value = d;
}

// ===== 书库 =====
async function loadBooks() {
  try {
    const r = await fetch(`${API}/api/books`);
    const d = await r.json();
    allBooks = d.books || [];
    renderBookList();
  } catch(e) { console.error(e); }
}

function renderBookList() {
  const el = document.getElementById('bookList');
  const q = (document.getElementById('bookSearch')?.value || '').toLowerCase();
  const scope = document.getElementById('searchScope')?.value || 'title';
  const filtered = q ? allBooks.filter(b => b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q)) : allBooks;
  if (!filtered.length) { el.innerHTML = '<div class="empty"><span class="e">📚</span>暂无书籍</div>'; return; }

  let html = '';
  filtered.forEach(b => {
    const isExpanded = b.id === curBook && currentBookData;
    const on = b.id === curBook ? ' on' : '';
    const arrow = isExpanded ? '▼' : '▶';
    html += `<div class="bk${on}" onclick="selectBook('${b.id}')">
      <span class="bi" style="font-size:8px">${arrow}</span>
      <span class="bi">📖</span>
      <div style="flex:1;min-width:0"><div class="bn">${esc(b.title)}</div><div class="bm">${b.author?esc(b.author)+' · ':''}${b.chapter_count}章</div></div>
      <span class="bx" onclick="event.stopPropagation();confirmDelete('book','${b.id}','「${esc(b.title)}」')">×</span>
    </div>`;
    if (isExpanded) {
      const chs = currentBookData.chapters || [];
      chs.forEach((ch,i) => {
        const chOn = ch.id === curCh ? ' on' : '';
        const chEditing = ch.id === curCh && currentChTitle ? ' editing' : '';
        html += `<div class="ch${chOn}${chEditing}" draggable="true"
          ondragstart="dragStart(event,${i})"
          ondragover="dragOver(event)"
          ondragleave="dragLeave(event)"
          ondrop="dropChapter(event,${i})"
          ondragend="dragEnd(event)"
          onclick="loadChapterById('${b.id}','${ch.id}')">
          <span class="ch-t">${esc(ch.title)}</span>
          <span class="ch-x" onclick="event.stopPropagation();confirmDelete('chapter','${ch.id}','「${esc(ch.title)}」')">×</span>
        </div>`;
      });
      html += `<div class="ch-add" onclick="event.stopPropagation();showModal('addChModal')">+ 添加章节</div>`;
    }
  });
  el.innerHTML = html;
}

// ===== 内容搜索 =====
let searchTimer = null;
function handleSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('bookSearch').value.trim();
    const scope = document.getElementById('searchScope').value;
    if (!q) { await loadBooks(); return; }
    if (scope === 'title') {
      renderBookList();
    } else {
      try {
        const r = await fetch(`${API}/api/books/search?q=${encodeURIComponent(q)}&scope=content`);
        const d = await r.json();
        renderSearchResults(d.results || [], q);
      } catch(e) { console.error(e); }
    }
  }, 400);
}

function renderSearchResults(results, q) {
  const el = document.getElementById('bookList');
  if (!results.length) { el.innerHTML = '<div class="empty"><span class="e">🔍</span>未找到匹配内容</div>'; return; }
  let html = '<div style="padding:4px 8px;font-size:9px;color:var(--wn);margin-bottom:4px;cursor:pointer" onclick="loadBooks();handleSearch()">📖 内容搜索结果 · 点击返回书库</div>';
  results.forEach(b => {
    html += `<div class="bk" onclick="curBook=null;currentBookData=null;selectBook('${b.id}')">
      <span class="bi">📖</span>
      <div style="flex:1;min-width:0"><div class="bn">${esc(b.title)}</div><div class="bm">${b.author?esc(b.author)+' · ':''}${b.chapter_count||0}章</div></div>
    </div>`;
    if (b.matched_chapters && b.matched_chapters.length) {
      b.matched_chapters.slice(0, 3).forEach(ch => {
        html += `<div class="ch" onclick="event.stopPropagation();curBook=null;currentBookData=null;selectBookAndChapter('${b.id}','${ch.id}')" style="background:var(--sf2)">
          <span class="ch-t">${esc(ch.title)}</span>
          <span style="font-size:9px;color:var(--wn);margin-left:4px">命中</span>
        </div>
        <div style="padding:2px 8px 2px 36px;font-size:9px;color:var(--tx3);line-height:1.4;margin-bottom:3px">${esc(ch.snippet)}</div>`;
      });
    }
  });
  el.innerHTML = html;
}

// ===== 章节拖拽排序（修复版）=====
let dragIdx = null;
function dragStart(e, idx) {
  dragIdx = idx;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function dropChapter(e, targetIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragIdx === null || dragIdx === targetIdx) return;

  const chEls = Array.from(document.querySelectorAll('.ch[draggable=true]'));
  const chIds = chEls.map(el => {
    const m = el.getAttribute('onclick').match(/'(ch_[^']+)'/);
    return m ? m[1] : null;
  }).filter(Boolean);

  if (chIds.length < 2) return;

  // 移动元素
  const movedId = chIds[dragIdx];
  chIds.splice(dragIdx, 1);
  const adjustedTarget = targetIdx > dragIdx ? targetIdx - 1 : targetIdx;
  chIds.splice(adjustedTarget, 0, movedId);

  reorderChapters(curBook, chIds);
}
function dragEnd(e) {
  e.currentTarget.classList.remove('dragging','drag-over');
  document.querySelectorAll('.ch').forEach(el => el.classList.remove('drag-over'));
  dragIdx = null;
}

async function reorderChapters(bookId, chapterIds) {
  try {
    await fetch(`${API}/api/books/${bookId}/chapters/reorder`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chapter_ids:chapterIds})
    });
    toast('章节顺序已更新','ok');
    const r = await fetch(`${API}/api/books/${bookId}`);
    currentBookData = await r.json();
    renderBookList();
  } catch(e) { toast('排序失败','err'); }
}

async function selectBook(id) {
  if (curBook === id) {
    curBook = null; curCh = null; currentBookData = null; currentChTitle = null;
    renderBookList();
    updateEditorButtons();
    return;
  }
  curBook = id; curCh = null;
  try {
    const r = await fetch(`${API}/api/books/${id}`);
    currentBookData = await r.json();
    renderBookList();
    updateEditorButtons();
  } catch(e) { toast('加载失败','err'); }
}

function loadChapterById(bookId, chId) {
  if (!currentBookData || currentBookData.id !== bookId) return;
  const ch = (currentBookData.chapters || []).find(c => c.id === chId);
  if (!ch) return;
  curCh = chId;
  currentChTitle = ch.title;
  document.getElementById('origText').value = ch.content;
  document.getElementById('resultText').innerHTML = '等待翻改...';
  document.getElementById('repInfo').textContent = '结果';
  updateCnt(); saveDraft();
  renderBookList();
  updateEditorButtons();
  toast(`已加载「${ch.title}」`,'ok');
}

async function selectBookAndChapter(bookId, chId) {
  await selectBook(bookId);
  // 等待 DOM 更新后加载章节
  setTimeout(() => loadChapterById(bookId, chId), 100);
}

// ===== 编辑器按钮更新 =====
function updateEditorButtons() {
  const saveBtn = document.getElementById('saveChBtn');
  const applyBtn = document.getElementById('applyBtn');
  const origTitle = document.getElementById('origTitle');

  if (curCh && currentChTitle) {
    saveBtn.style.display = 'block';
    origTitle.textContent = '原文 · ' + currentChTitle;
    applyBtn.style.display = 'block';
  } else {
    saveBtn.style.display = 'none';
    origTitle.textContent = '原文';
    applyBtn.style.display = 'none';
  }
}

// ===== 保存章节内容 =====
async function saveChapterContent() {
  if (!curBook || !curCh) { toast('请先选择章节','wn'); return; }
  const content = document.getElementById('origText').value;
  showLd('保存中...');
  try {
    const r = await fetch(`${API}/api/books/${curBook}/chapters/${curCh}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ content })
    });
    if (!r.ok) throw new Error('保存失败');
    toast('章节已保存','ok');
    const r2 = await fetch(`${API}/api/books/${curBook}`);
    currentBookData = await r2.json();
    renderBookList();
  } catch(e) { toast('保存失败: '+e.message,'err'); }
  finally { hideLd(); }
}

// ===== 应用翻改结果到章节 =====
async function applyResultToChapter() {
  if (!curBook || !curCh) { toast('请先选择章节','wn'); return; }
  const resultEl = document.getElementById('resultText');
  const resultText = resultEl.textContent;
  if (!resultText || resultText === '等待翻改...' || resultText === '无翻改结果') {
    toast('没有可应用的结果','wn'); return;
  }
  // 提取纯文本（去除高亮标记）
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = resultEl.innerHTML;
  const cleanText = tempDiv.textContent || tempDiv.innerText || resultText;

  document.getElementById('origText').value = cleanText;
  updateCnt();
  await saveChapterContent();
  toast('翻改结果已应用到章节','ok');
}

// ===== 删除 =====
let deleteTarget = null;
function confirmDelete(type, id, name) {
  deleteTarget = { type, id };
  document.getElementById('confirmText').textContent = `确定要删除${name}吗？此操作不可撤销。`;
  document.getElementById('confirmBtn').onclick = executeDelete;
  showModal('confirmModal');
}
async function executeDelete() {
  if (!deleteTarget) return;
  const { type, id } = deleteTarget;
  hideModal('confirmModal');
  try {
    if (type === 'book') {
      await fetch(`${API}/api/books/${id}`, {method:'DELETE'});
      if (curBook === id) { curBook = null; curCh = null; currentBookData = null; currentChTitle = null; }
      toast('已删除','ok');
      await loadBooks();
      updateEditorButtons();
    } else if (type === 'chapter' && curBook) {
      await fetch(`${API}/api/books/${curBook}/chapters/${id}`, {method:'DELETE'});
      if (curCh === id) { curCh = null; currentChTitle = null; }
      toast('已删除','ok');
      const r = await fetch(`${API}/api/books/${curBook}`);
      currentBookData = await r.json();
      await loadBooks();
      curBook = currentBookData.id;
      renderBookList();
      updateEditorButtons();
    } else if (type === 'template') {
      await fetch(`${API}/api/rules/${id}`, {method:'DELETE'});
      toast('已删除','ok');
      await loadTemplates();
    }
  } catch(e) { toast('删除失败','err'); }
  deleteTarget = null;
}

function togglePanel(id) { document.getElementById(id).classList.toggle('hide'); }

// ===== 替换规则 =====
function addRule(o='', r='') {
  const c = document.getElementById('rulesBox');
  const d = document.createElement('div');
  d.className = 'rc';
  d.innerHTML = `<input type="text" placeholder="原名" value="${esc(o)}" class="oi"><span class="ar">→</span><input type="text" placeholder="新名" value="${esc(r)}" class="ri" oninput="updateRuleStat()"><button class="dx" onclick="this.closest('.rc').remove();updateRuleStat()">×</button>`;
  c.appendChild(d);
  updateRuleStat();
}
function clearRules() {
  document.getElementById('rulesBox').innerHTML = '';
  addRule();
  updateRuleStat();
  toast('规则已清空','ok');
}
function getRules() {
  const rules = [];
  document.querySelectorAll('.rc').forEach(c => {
    const o = c.querySelector('.oi').value.trim();
    const r = c.querySelector('.ri').value.trim();
    if (o && r) rules.push({original:o, replacement:r});
  });
  return rules;
}
function updateRuleStat() { document.getElementById('sRules').textContent = getRules().length; }

function toggleBatch() { document.getElementById('batchArea').classList.toggle('show'); }

function parseBatch() {
  const txt = document.getElementById('batchInput').value.trim();
  if (!txt) return;
  const lines = txt.split('\n').filter(l => l.trim());
  let count = 0;
  lines.forEach(line => {
    const parts = line.split(/[→=]/);
    if (parts.length >= 2) {
      const o = parts[0].trim(), r = parts.slice(1).join('→').trim();
      if (o && r) { addRule(o, r); count++; }
    }
  });
  document.getElementById('batchInput').value = '';
  toast(`已添加 ${count} 条规则`,'ok');
}

// ===== 智能提取 =====
async function extractNames() {
  const text = document.getElementById('origText').value.trim();
  if (!text) { toast('请先输入原文','wn'); return; }
  showLd('提取中...');
  extractedNames = {};
  try {
    const r = await fetch(`${API}/api/extract`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text}) });
    if (!r.ok) throw new Error('提取失败');
    const d = await r.json();
    showExtractResults(d.names);
  } catch(e) { toast('提取失败','err'); }
  finally { hideLd(); }
}

function showExtractResults(names) {
  const el = document.getElementById('extResults');
  el.innerHTML = '';
  const cats = [
    {key:'person', label:'👤 人物', cls:'tag-p'},
    {key:'location', label:'🗺️ 地名', cls:'tag-l'},
    {key:'organization', label:'🏛️ 组织', cls:'tag-o'},
    {key:'item', label:'⚔️ 物品', cls:'tag-i'}
  ];
  let hasAny = false;
  cats.forEach(cat => {
    const items = names[cat.key] || [];
    if (!items.length) return;
    hasAny = true;
    const sec = document.createElement('div');
    sec.style.marginBottom = '5px';
    sec.innerHTML = `<span class="tag ${cat.cls}">${cat.label}</span> `;
    items.forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'nc';
      chip.textContent = name;
      chip.dataset.name = name;
      chip.onclick = () => toggleExtractedName(chip, name);
      sec.appendChild(chip);
    });
    el.appendChild(sec);
  });
  if (!hasAny) { el.innerHTML = '<div style="font-size:10px;color:var(--tx3)">未提取到名称</div>'; }
  document.getElementById('extPanel').classList.add('show');
}

function toggleExtractedName(chip, name) {
  const isSelected = chip.classList.toggle('sel');
  if (isSelected) {
    addRule(name, '');
    extractedNames[name] = true;
    const cards = document.querySelectorAll('.rc');
    const last = cards[cards.length - 1];
    if (last) last.querySelector('.ri').focus();
  } else if (extractedNames[name]) {
    document.querySelectorAll('.rc').forEach(c => {
      const oi = c.querySelector('.oi');
      if (oi && oi.value === name) c.remove();
    });
    delete extractedNames[name];
    updateRuleStat();
  }
}

// ===== 模板 =====
async function loadTemplates() {
  try {
    const r = await fetch(`${API}/api/rules`);
    const d = await r.json();
    renderTemplates(d.rules || []);
  } catch(e) {}
}
function renderTemplates(tps) {
  const el = document.getElementById('tpList');
  if (!tps.length) { el.innerHTML = '<div style="font-size:9px;color:var(--tx3)">暂无模板</div>'; return; }
  el.innerHTML = '';
  tps.forEach(t => {
    const d = document.createElement('div');
    d.className = 'tp-item';
    d.innerHTML = `<span>${esc(t.name)} (${t.rules.length})</span><span class="bx" style="opacity:1;font-size:11px" onclick="event.stopPropagation();confirmDelete('template','${t.id}','「${esc(t.name)}」模板')">×</span>`;
    d.onclick = () => { t.rules.forEach(r => addRule(r.original, r.replacement)); toast(`已加载 ${t.rules.length} 条规则`,'ok'); };
    el.appendChild(d);
  });
}
async function saveTemplate() {
  const name = document.getElementById('tpName').value.trim();
  if (!name) { toast('请输入模板名','wn'); return; }
  const rules = getRules();
  if (!rules.length) { toast('没有可保存的规则','wn'); return; }
  try {
    await fetch(`${API}/api/rules`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,rules}) });
    hideModal('saveTpModal');
    document.getElementById('tpName').value = '';
    toast('模板已保存','ok');
    await loadTemplates();
  } catch(e) { toast('保存失败','err'); }
}

// ===== AI 选项 =====
function toggleAi() {
  const on = document.getElementById('useAi').checked;
  document.getElementById('aiSep').style.display = on?'':'none';
  document.getElementById('aiPrvLbl').style.display = on?'':'none';
  document.getElementById('aiLvLbl').style.display = on?'':'none';
  document.getElementById('sAi').style.display = on?'':'none';
}

// ===== API Key =====
function loadApiKey() {
  const provider = document.getElementById('apiKeyProvider').value;
  const key = localStorage.getItem('nr_apikey_' + provider) || '';
  document.getElementById('apiKeyIn').value = key;
}
function saveApiKey() {
  const provider = document.getElementById('apiKeyProvider').value;
  const key = document.getElementById('apiKeyIn').value.trim();
  localStorage.setItem('nr_apikey_' + provider, key);
  hideModal('apiModal');
  toast('API Key 已保存','ok');
}

// ===== 文件导入 =====
function importFile() {
  document.getElementById('fileInput').click();
}
function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('origText').value = e.target.result;
    updateCnt();
    saveDraft();
    toast(`已导入 ${file.name}`,'ok');
  };
  reader.readAsText(file, 'UTF-8');
  event.target.value = '';
}

// ===== 下载 =====
function downloadResult() {
  const resultEl = document.getElementById('resultText');
  const t = resultEl.textContent;
  if (!t || t==='等待翻改...') { toast('没有可下载的内容','wn'); return; }
  let content, fileName;
  if (bookRewriteResult && bookRewriteResult.chapters && bookRewriteResult.chapters.length > 0) {
    content = `《${bookRewriteResult.book_title}》翻改结果\n${'='.repeat(40)}\n\n`;
    bookRewriteResult.chapters.forEach(ch => {
      content += `${ch.title}\n${'-'.repeat(30)}\n${ch.rewritten}\n\n`;
    });
    fileName = `${bookRewriteResult.book_title}_翻改结果_${new Date().toISOString().slice(0,10)}.txt`;
  } else {
    content = t;
    const chName = currentChTitle ? `_${currentChTitle}` : '';
    fileName = `翻改结果${chName}_${new Date().toISOString().slice(0,10)}.txt`;
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:'text/plain;charset=utf-8'}));
  a.download = fileName;
  a.click();
  toast('已下载','ok');
}

// ===== 计数 =====
function updateCnt() {
  const o = document.getElementById('origText').value;
  const r = document.getElementById('resultText').textContent;
  document.getElementById('cntO').textContent = o.length;
  document.getElementById('cntR').textContent = (r==='等待翻改...') ? 0 : r.length;
}

// ===== 翻改（非流式）=====
async function doRewrite() {
  const text = document.getElementById('origText').value.trim();
  if (!text) { toast('请先输入原文','wn'); return; }
  const rules = getRules();
  if (!rules.length) { toast('请添加替换规则','wn'); return; }
  const useAi = document.getElementById('useAi').checked;
  const intensity = document.getElementById('aiLv').value;
  const provider = document.getElementById('aiProvider').value;
  const apiKey = localStorage.getItem('nr_apikey_' + provider) || '';
  if (useAi && !apiKey) { showModal('apiModal'); return; }

  const btn = document.getElementById('rewriteBtn');
  btn.disabled = true;
  showLd(useAi ? 'AI改写中（可能需要30-60秒）...' : '翻改中...');
  try {
    const r = await fetch(`${API}/api/rewrite`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, rules, use_ai:useAi, ai_intensity:intensity, api_key:useAi?apiKey:null, ai_provider:provider })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail||'翻改失败'); }
    const d = await r.json();
    lastRewriteData = d;
    renderResult(d);
    let total = 0;
    d.replacements.forEach(rp => { if (rp.original!=='⚠️') total += rp.count; });
    document.getElementById('sReps').textContent = total;
    document.getElementById('repInfo').textContent = `${total}处替换`;
    updateCnt();
    toast(`翻改完成！${total}处替换`,'ok');
  } catch(e) { toast('翻改失败: '+e.message,'err'); }
  finally { btn.disabled = false; hideLd(); }
}

function renderResult(data) {
  const el = document.getElementById('resultText');
  let html = esc(data.rewritten);
  if (data.replacements) {
    // 按替换词长度降序排列，避免短词先匹配导致长词被截断
    const sorted = data.replacements.filter(rp => rp.original !== '⚠️').sort((a,b) => b.replacement.length - a.replacement.length);
    const highlighted = new Set();
    sorted.forEach(rp => {
      const rEsc = esc(rp.replacement);
      if (!highlighted.has(rEsc)) {
        html = html.split(rEsc).join(`<span class="diff-new">${rEsc}</span>`);
        highlighted.add(rEsc);
      }
    });
  }
  el.innerHTML = html;
  applyFontSize();
}

// ===== 整本翻改（SSE流式）=====
async function rewriteBookStream() {
  if (!curBook || !currentBookData) { toast('请先选择一本书','wn'); return; }
  const rules = getRules();
  if (!rules.length) { toast('请添加替换规则','wn'); return; }
  const useAi = document.getElementById('useAi').checked;
  const intensity = document.getElementById('aiLv').value;
  const provider = document.getElementById('aiProvider').value;
  const apiKey = useAi ? (localStorage.getItem('nr_apikey_' + provider) || '') : '';
  if (useAi && !apiKey) { showModal('apiModal'); return; }

  const chapters = currentBookData.chapters || [];
  if (!chapters.length) { toast('该书没有章节','wn'); return; }

  const btn = document.getElementById('rewriteBookBtn');
  btn.disabled = true;
  const progEl = document.getElementById('bookRewriteProgress');
  progEl.style.display = 'block';
  bookRewriteResult = { book_id: curBook, book_title: currentBookData.title, total_chapters: 0, total_replacements: 0, chapters: [] };

  const resultEl = document.getElementById('resultText');
  resultEl.innerHTML = '<div style="color:var(--tx3);font-size:11px;">📡 流式翻改中，请稍候...</div>';

  for (let i = 0; i < chapters.length; i++) {
    const ch = chapters[i];
    const pct = Math.round(((i + 1) / chapters.length) * 100);
    document.getElementById('brProgress').style.width = pct + '%';
    document.getElementById('brProgressText').textContent = `第${i+1}/${chapters.length}章 ${pct}%`;
    document.getElementById('brStatus').textContent = `正在翻改: ${ch.title}`;

    try {
      if (!useAi) {
        const r = await fetch(`${API}/api/books/${curBook}/rewrite`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ rules, use_ai: false, api_key: null, ai_provider: provider, chapter_ids: [ch.id] })
        });
        if (r.ok) {
          const d = await r.json();
          if (d.chapters && d.chapters[0]) {
            bookRewriteResult.chapters.push(d.chapters[0]);
            bookRewriteResult.total_replacements += d.chapters[0].replace_count;
          }
        }
      } else {
        await streamRewriteChapter(ch, rules, intensity, apiKey, provider);
      }
    } catch(e) { /* skip */ }
  }

  bookRewriteResult.total_chapters = bookRewriteResult.chapters.length;
  showBookRewriteResult(bookRewriteResult);
  btn.disabled = false;
  progEl.style.display = 'none';
  toast(`整本翻改完成！${bookRewriteResult.total_replacements}处替换`,'ok');
}

// SSE流式翻改单章
let streamRenderTimer = null;

function streamRewriteChapter(ch, rules, intensity, apiKey, provider) {
  return new Promise(async (resolve) => {
    streamRenderTimer = null;
    try {
      const body = JSON.stringify({
        text: ch.content, rules, use_ai: true, ai_intensity: intensity,
        api_key: apiKey, ai_provider: provider
      });
      const r = await fetch(`${API}/api/rewrite/stream`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body
      });
      if (!r.ok) { resolve(); return; }
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const dataStr = line.slice(6);
          if (dataStr === '[DONE]') continue;
          try {
            const data = JSON.parse(dataStr);
            if (data.type === 'chunk') {
              fullText += data.content;
              if (!streamRenderTimer) {
                streamRenderTimer = setTimeout(() => {
                  const el = document.getElementById('resultText');
                  const statusDiv = el.querySelector('div');
                  const contentDiv = statusDiv ? statusDiv.nextElementSibling : null;
                  if (contentDiv) {
                    contentDiv.textContent = fullText;
                  } else {
                    el.innerHTML = `<div style="font-size:11px;color:var(--pm)">正在翻改：${esc(ch.title)}</div><div style="margin-top:8px">${esc(fullText)}</div>`;
                  }
                  streamRenderTimer = null;
                }, 100);
              }
            } else if (data.type === 'done') {
              let rewritten = data.rewritten || fullText;
              let repDetails = data.replacements || [];
              let total = 0;
              repDetails.forEach(rp => { if (rp.original !== '⚠️') total += rp.count; });
              bookRewriteResult.chapters.push({
                id: ch.id, title: ch.title,
                original: ch.content, rewritten, replacements: repDetails, replace_count: total
              });
              bookRewriteResult.total_replacements += total;
            } else if (data.type === 'error') {
              console.error('SSE error:', data.msg);
            }
          } catch(e) {}
        }
      }
    } catch(e) { console.error(e); }
    if (streamRenderTimer) { clearTimeout(streamRenderTimer); streamRenderTimer = null; }
    resolve();
  });
}

function showBookRewriteResult(data) {
  const el = document.getElementById('resultText');
  let html = '';
  (data.chapters || []).forEach(ch => {
    html += `<div style="margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)">
      <div style="font-size:11px;color:var(--pm);font-weight:bold;margin-bottom:4px">${esc(ch.title)} <span style="color:var(--tx3);font-weight:normal">(${ch.replace_count}处替换)</span></div>`;
    let chHtml = esc(ch.rewritten);
    if (ch.replacements) {
      ch.replacements.forEach(rp => {
        if (rp.original === '⚠️') return;
        const rEsc = esc(rp.replacement);
        chHtml = chHtml.split(rEsc).join(`<span class="diff-new">${rEsc}</span>`);
      });
    }
    html += `<div style="font-size:13px;line-height:1.9;white-space:pre-wrap;word-break:break-all">${chHtml}</div></div>`;
  });
  if (!html) html = '<div style="color:var(--tx3)">无翻改结果</div>';
  el.innerHTML = html;
  document.getElementById('repInfo').textContent = `${data.total_replacements}处替换 · ${data.total_chapters}章`;
  document.getElementById('cntR').textContent = el.textContent.length;
}

// ===== 同步滚动 =====
function setupSyncScroll() {
  const origS = document.getElementById('origScroll');
  const resultS = document.getElementById('resultScroll');
  if (!origS || !resultS) return;
  let syncing = false;
  origS.addEventListener('scroll', () => {
    if (syncing || !syncScrollEnabled) return;
    syncing = true;
    const ratio = origS.scrollTop / (origS.scrollHeight - origS.clientHeight || 1);
    resultS.scrollTop = ratio * (resultS.scrollHeight - resultS.clientHeight);
    requestAnimationFrame(() => syncing = false);
  });
  resultS.addEventListener('scroll', () => {
    if (syncing || !syncScrollEnabled) return;
    syncing = true;
    const ratio = resultS.scrollTop / (resultS.scrollHeight - resultS.clientHeight || 1);
    origS.scrollTop = ratio * (origS.scrollHeight - origS.clientHeight);
    requestAnimationFrame(() => syncing = false);
  });
}
function toggleSyncScroll() {
  syncScrollEnabled = document.getElementById('syncScrollCb').checked;
}

// ===== 工具函数 =====
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }
function showLd(t) { document.getElementById('ldText').textContent=t; document.getElementById('ldBg').classList.add('show'); }
function hideLd() { document.getElementById('ldBg').classList.remove('show'); }
function toast(msg,type='ok') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast toast-${type} show`; setTimeout(()=>t.classList.remove('show'),2500); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ===== 版本号 =====
async function fetchVersion() {
  try {
    const r = await fetch(`${API}/api/health`);
    const d = await r.json();
    document.getElementById('verBadge').textContent = d.version || '6.2';
  } catch(e) { document.getElementById('verBadge').textContent = '6.2'; }
}

// ===== 复制功能 =====
function copyText(id) {
  const el = document.getElementById(id);
  const text = el.value || el.textContent;
  navigator.clipboard.writeText(text).then(() => toast('已复制','ok')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制','ok');
  });
}
function copyResult() {
  const text = document.getElementById('resultText').textContent;
  if (!text || text === '等待翻改...') { toast('没有可复制的内容','wn'); return; }
  navigator.clipboard.writeText(text).then(() => toast('已复制','ok')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制','ok');
  });
}

// ===== 创建书籍 =====
async function createBook() {
  const title = document.getElementById('newBookTitle').value.trim();
  if (!title) { toast('请输入书名','wn'); return; }
  const author = document.getElementById('newBookAuthor').value.trim();
  const content = document.getElementById('newBookContent').value.trim();
  const chapters = content ? [{ title:'第一章', content }] : [];
  try {
    const r = await fetch(`${API}/api/books`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,author,chapters}) });
    const d = await r.json();
    hideModal('addBookModal');
    document.getElementById('newBookTitle').value='';
    document.getElementById('newBookAuthor').value='';
    document.getElementById('newBookContent').value='';
    toast(`「${title}」已创建`,'ok');
    await loadBooks();
    await selectBook(d.id);
  } catch(e) { toast('创建失败','err'); }
}

// ===== 添加章节 =====
async function addChapter() {
  if (!curBook) { toast('请先选择一本书','wn'); return; }
  const title = document.getElementById('newChTitle').value.trim() || `第${Date.now()%10000}章`;
  const content = document.getElementById('newChContent').value.trim();
  if (!content) { toast('请输入内容','wn'); return; }
  try {
    await fetch(`${API}/api/books/${curBook}/chapters`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,content}) });
    hideModal('addChModal');
    document.getElementById('newChTitle').value='';
    document.getElementById('newChContent').value='';
    toast(`「${title}」已添加`,'ok');
    const r = await fetch(`${API}/api/books/${curBook}`);
    currentBookData = await r.json();
    await loadBooks();
    curBook = currentBookData.id;
    renderBookList();
  } catch(e) { toast('添加失败','err'); }
}

// ===== 键盘快捷键（智能保存）=====
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); doRewrite(); }
  if (e.key === 'Escape') { document.querySelectorAll('.modal-bg.show').forEach(m => m.classList.remove('show')); }
  // Ctrl+S 智能保存
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    if (curCh) { saveChapterContent(); } else { saveDraft(); toast('草稿已保存','ok'); }
  }
});

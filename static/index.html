<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说翻改工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--sf:#12121e;--sf2:#1a1a2e;--sf3:#222240;--bd:#2a2a4a;--tx:#e0e0e0;--tx2:#999;--tx3:#555;
--pm:#7c5cfc;--pm2:#5a3fd6;--pmbg:rgba(124,92,252,.1);--ac:#ff6b9d;--ok:#4ecdc4;--wn:#ffe66d;--dg:#ff6b6b}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* 顶栏 */
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar h1{font-size:1.2em;background:linear-gradient(135deg,var(--pm),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .ver{font-size:.6em;padding:2px 7px;background:var(--pm);border-radius:10px;color:#fff}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}

/* 通用按钮 */
.btn{padding:6px 12px;border:none;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;font-weight:500;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--pm),var(--pm2));color:#fff}
.btn-p:hover{box-shadow:0 3px 10px rgba(124,92,252,.4)}
.btn-g{background:var(--sf3);color:var(--tx);border:1px solid var(--bd)}
.btn-g:hover{background:var(--bd)}
.btn-a{background:linear-gradient(135deg,var(--ac),#ff4d8a);color:#fff}
.btn-ok{background:var(--ok);color:var(--bg)}
.btn-d{background:var(--dg);color:#fff}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-xs{padding:2px 6px;font-size:10px;border-radius:4px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* 三栏 */
.main{flex:1;display:flex;overflow:hidden}

/* 左栏 书库 */
.panel-l{width:260px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
.panel-l.hide{width:0;overflow:hidden;border:none}
.ph{padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ph h2{font-size:.85em}
.pb{flex:1;overflow-y:auto;padding:6px}

.book-search{padding:6px 8px}
.book-search input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:12px}
.book-search input:focus{outline:none;border-color:var(--pm)}

.bk{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background .12s;display:flex;align-items:center;gap:8px}
.bk:hover{background:var(--sf3)}
.bk.on{background:var(--pmbg);border-left:3px solid var(--pm)}
.bk .bi{font-size:1.1em}
.bk .bn{flex:1;min-width:0;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk .bm{font-size:10px;color:var(--tx3)}
.bk .bx{opacity:0;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 4px;flex-shrink:0}
.bk:hover .bx{opacity:1}
.bk .bx:hover{color:var(--dg)}

.ch{padding:5px 10px 5px 30px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--tx2);transition:all .12s;margin-bottom:1px}
.ch:hover{background:var(--sf3);color:var(--tx)}
.ch.on{color:var(--pm);background:var(--pmbg)}
.ch-add{padding:5px 10px 5px 30px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--pm);text-align:center}

/* 中栏 规则 */
.panel-m{width:290px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}

.rc{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:6px 8px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.rc:hover{border-color:var(--pm)}
.rc .ar{color:var(--pm);font-weight:bold}
.rc input{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;color:var(--tx);font-size:12px;min-width:0}
.rc input:focus{outline:none;border-color:var(--pm)}
.rc .dx{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 3px}
.rc .dx:hover{color:var(--dg)}

.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:bold;margin-right:3px}
.tag-p{background:rgba(78,205,196,.15);color:var(--ok)}
.tag-l{background:rgba(255,230,109,.15);color:var(--wn)}
.tag-o{background:rgba(124,92,252,.15);color:var(--pm)}

.ep{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:10px;margin-top:8px;display:none}
.ep.show{display:block}
.ep h3{font-size:.78em;color:var(--tx2);margin-bottom:6px}
.nc{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px;cursor:pointer;transition:all .12s;border:1px solid var(--bd);background:var(--bg)}
.nc:hover{border-color:var(--pm);background:var(--pmbg)}
.nc.sel{border-color:var(--pm);background:rgba(124,92,252,.25)}

.tp-item{padding:5px 8px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--tx2);display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.tp-item:hover{background:var(--sf3);color:var(--tx)}

/* 右栏 编辑器 */
.panel-r{flex:1;display:flex;flex-direction:column;overflow:hidden}

.toolbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.toolbar .sep{width:1px;height:16px;background:var(--bd)}
.toolbar label{font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:4px;cursor:pointer}
.toolbar select{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:3px 6px;color:var(--tx);font-size:11px}
.toolbar select:focus{outline:none;border-color:var(--pm)}
.toolbar input[type=checkbox]{accent-color:var(--pm)}
.toolbar .counter{margin-left:auto;font-size:11px;color:var(--tx3)}

.cmp{flex:1;display:flex;overflow:hidden}
.cmp-p{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cmp-p+.cmp-p{border-left:1px solid var(--bd)}
.cmp-h{padding:6px 12px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:6px}
.cmp-h .dot{width:6px;height:6px;border-radius:50%}
.cmp-b{flex:1;overflow-y:auto;padding:12px}
textarea.ed{width:100%;height:100%;background:var(--bg);border:none;color:var(--tx);font-size:13px;line-height:1.9;resize:none;font-family:inherit}
textarea.ed:focus{outline:none}
.result{font-size:13px;line-height:1.9;white-space:pre-wrap;word-break:break-all}
.diff-old{background:rgba(255,107,107,.15);text-decoration:line-through;color:var(--dg)}
.diff-new{background:rgba(78,205,196,.15);color:var(--ok)}

.sbar{background:var(--sf);border-top:1px solid var(--bd);padding:4px 12px;font-size:11px;color:var(--tx3);display:flex;gap:12px;flex-shrink:0}
.sbar .v{color:var(--pm);font-weight:bold}

/* 模态 */
.modal-bg{position:fixed;inset:0;background:rgba(10,10,20,.85);display:none;align-items:center;justify-content:center;z-index:999}
.modal-bg.show{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;width:420px;max-width:92vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.05em;margin-bottom:8px}
.modal p{color:var(--tx2);font-size:12px;margin-bottom:12px;line-height:1.6}
.modal input[type=text],.modal textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;margin-bottom:8px}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--pm)}
.modal textarea{height:100px;resize:vertical;font-family:inherit}
.modal-act{display:flex;gap:8px;justify-content:flex-end}

/* Loading */
.ld-bg{position:fixed;inset:0;background:rgba(10,10,20,.8);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:12px}
.ld-bg.show{display:flex}
.spin{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--pm);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-text{font-size:13px;color:var(--tx2)}

/* Toast */
.toast{position:fixed;top:14px;right:14px;padding:8px 16px;border-radius:6px;font-size:12px;z-index:2000;transform:translateX(120%);transition:transform .25s}
.toast.show{transform:translateX(0)}
.toast-ok{background:var(--ok);color:var(--bg)}
.toast-err{background:var(--dg);color:#fff}
.toast-wn{background:var(--wn);color:var(--bg)}

/* 空提示 */
.empty{text-align:center;padding:24px 12px;color:var(--tx3);font-size:12px;line-height:1.8}
.empty .e{font-size:2em;display:block;margin-bottom:6px}

/* 批量添加规则 */
.batch-area{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:8px;margin-bottom:8px;display:none}
.batch-area.show{display:block}
.batch-area textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:6px;color:var(--tx);font-size:12px;height:80px;resize:vertical;font-family:inherit}
.batch-area textarea:focus{outline:none;border-color:var(--pm)}
.batch-area p{font-size:10px;color:var(--tx3);margin-top:4px}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="btn btn-g btn-sm" onclick="toggleLeft()" title="书库">📚</button>
    <h1>📖 小说翻改工具</h1><span class="ver">v3.1</span>
    <div class="topbar-right">
      <button class="btn btn-g btn-sm" onclick="showModal('apiModal')">🔑 API</button>
      <button class="btn btn-g btn-sm" onclick="downloadResult()">💾 下载</button>
    </div>
  </div>

  <div class="main">
    <!-- 左栏 书库 -->
    <div class="panel-l" id="panelL">
      <div class="ph"><h2>📚 书库</h2><button class="btn btn-p btn-xs" onclick="showModal('addBookModal')">+ 新书</button></div>
      <div class="book-search"><input id="bookSearch" placeholder="搜索书名/作者..." oninput="filterBooks()"></div>
      <div class="pb" id="bookList"></div>
    </div>

    <!-- 中栏 规则 -->
    <div class="panel-m">
      <div class="ph">
        <h2>🔄 替换规则</h2>
        <div style="display:flex;gap:3px">
          <button class="btn btn-g btn-xs" onclick="toggleBatch()" title="批量添加">📝</button>
          <button class="btn btn-g btn-xs" onclick="showModal('saveTpModal')" title="保存模板">💾</button>
          <button class="btn btn-p btn-xs" onclick="addRule()">+ 添加</button>
        </div>
      </div>
      <div class="pb">
        <div class="batch-area" id="batchArea">
          <textarea id="batchInput" placeholder="每行一条，格式：原名→新名&#10;例：&#10;萧炎→林焱&#10;药老→魂老"></textarea>
          <p>每行一条，用 → 或 = 分隔</p>
          <button class="btn btn-p btn-sm" onclick="parseBatch()" style="width:100%;margin-top:4px">批量添加</button>
        </div>
        <div id="rulesBox"></div>
        <div style="margin-top:8px">
          <button class="btn btn-a btn-sm" onclick="extractNames()" style="width:100%">🧠 智能提取名称</button>
        </div>
        <div class="ep" id="extPanel">
          <h3>提取结果（点击添加到规则）</h3>
          <div id="extResults"></div>
        </div>
        <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--bd)">
          <div style="font-size:.78em;color:var(--tx2);margin-bottom:4px">📦 已保存模板</div>
          <div id="tpList"></div>
        </div>
      </div>
      <div style="padding:8px;border-top:1px solid var(--bd)">
        <button class="btn btn-p" onclick="doRewrite()" style="width:100%;padding:9px;font-size:13px">🚀 开始翻改</button>
      </div>
    </div>

    <!-- 右栏 编辑器 -->
    <div class="panel-r">
      <div class="toolbar">
        <label><input type="checkbox" id="useAi" onchange="toggleAi()"> AI改写</label>
        <div class="sep" id="aiSep" style="display:none"></div>
        <label id="aiLbl" style="display:none">强度 <select id="aiLv"><option value="light">轻微</option><option value="medium" selected>中等</option><option value="heavy">大幅</option></select></label>
        <div class="sep" id="diffSep" style="display:none"></div>
        <label id="diffLbl" style="display:none"><input type="checkbox" id="showDiff" checked onchange="refreshResult()"> 差异高亮</label>
        <div class="counter">原文 <span id="cntO">0</span> 字 → 改写 <span id="cntR">0</span> 字</div>
      </div>
      <div class="cmp">
        <div class="cmp-p">
          <div class="cmp-h"><div class="dot" style="background:var(--wn)"></div>原文</div>
          <div class="cmp-b"><textarea class="ed" id="origText" placeholder="粘贴小说原文，或从左侧书库加载章节..." oninput="updateCnt()"></textarea></div>
        </div>
        <div class="cmp-p">
          <div class="cmp-h"><div class="dot" style="background:var(--ok)"></div>改写结果 <span id="repInfo" style="margin-left:auto;font-size:10px"></span></div>
          <div class="cmp-b"><div class="result" id="resultText">等待翻改...</div></div>
        </div>
      </div>
      <div class="sbar">
        <div>规则: <span class="v" id="sRules">0</span></div>
        <div>替换: <span class="v" id="sReps">0</span></div>
        <div id="sAi" style="display:none">AI: <span class="v">开启</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="ld-bg" id="ldBg"><div class="spin"></div><div class="ld-text" id="ldText">处理中...</div></div>

<!-- API Key -->
<div class="modal-bg" id="apiModal">
  <div class="modal">
    <h2>🔑 智谱 API Key</h2>
    <p>AI改写需要智谱API Key。<br><a href="https://open.bigmodel.cn" target="_blank" style="color:var(--pm)">open.bigmodel.cn</a> 免费注册。</p>
    <input type="text" id="apiKeyIn" placeholder="输入智谱 API Key">
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('apiModal')">取消</button><button class="btn btn-p" onclick="saveApiKey()">保存</button></div>
  </div>
</div>

<!-- 新建书籍 -->
<div class="modal-bg" id="addBookModal">
  <div class="modal">
    <h2>📚 新建书籍</h2>
    <input type="text" id="newBookTitle" placeholder="书名（如：斗破苍穹）">
    <input type="text" id="newBookAuthor" placeholder="作者（选填）">
    <textarea id="newBookContent" placeholder="粘贴章节内容（选填，创建后可逐章添加）"></textarea>
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('addBookModal')">取消</button><button class="btn btn-p" onclick="createBook()">创建</button></div>
  </div>
</div>

<!-- 添加章节 -->
<div class="modal-bg" id="addChModal">
  <div class="modal">
    <h2>📝 添加章节</h2>
    <input type="text" id="newChTitle" placeholder="章节标题">
    <textarea id="newChContent" placeholder="粘贴章节内容..."></textarea>
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('addChModal')">取消</button><button class="btn btn-p" onclick="addChapter()">添加</button></div>
  </div>
</div>

<!-- 保存模板 -->
<div class="modal-bg" id="saveTpModal">
  <div class="modal">
    <h2>💾 保存规则模板</h2>
    <input type="text" id="tpName" placeholder="模板名称（如：斗破→武动）">
    <div class="modal-act"><button class="btn btn-g" onclick="hideModal('saveTpModal')">取消</button><button class="btn btn-p" onclick="saveTemplate()">保存</button></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let apiKey = localStorage.getItem('nr_apikey') || '';
let curBook = null, curCh = null;
let allBooks = [];
let lastRewriteData = null; // 保存最近一次翻改结果，用于切换高亮

// ====== 初始化 ======
async function init() {
  addRule();
  await loadBooks();
  await loadTemplates();
  updateCnt();
}

// ====== 书库 ======
async function loadBooks() {
  try {
    const r = await fetch(`${API}/api/books`);
    const d = await r.json();
    allBooks = d.books || [];
    renderBooks();
  } catch(e) { console.error(e); }
}

function renderBooks() {
  const el = document.getElementById('bookList');
  const q = (document.getElementById('bookSearch')?.value || '').toLowerCase();
  const filtered = q ? allBooks.filter(b => b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q)) : allBooks;
  if (!filtered.length) { el.innerHTML = '<div class="empty"><span class="e">📚</span>暂无书籍</div>'; return; }
  let html = '';
  filtered.forEach(b => {
    const on = b.id === curBook ? ' on' : '';
    html += `<div class="bk${on}" data-id="${b.id}" onclick="selectBook('${b.id}')">
      <span class="bi">📖</span>
      <div style="flex:1;min-width:0"><div class="bn">${esc(b.title)}</div><div class="bm">${b.author?esc(b.author)+' · ':''}${b.chapter_count}章</div></div>
      <span class="bx" onclick="event.stopPropagation();deleteBook('${b.id}')" title="删除">×</span>
    </div>`;
  });
  el.innerHTML = html;
}

function filterBooks() { renderBooks(); if (curBook) renderChapters(); }

async function selectBook(id) {
  if (curBook === id) { curBook = null; curCh = null; renderBooks(); return; }
  curBook = id; curCh = null;
  try {
    const r = await fetch(`${API}/api/books/${id}`);
    const book = await r.json();
    renderBooks();
    renderChapters(book);
  } catch(e) { toast('加载失败','err'); }
}

function renderChapters(book) {
  const el = document.getElementById('bookList');
  // 移除旧章节
  el.querySelectorAll('.ch,.ch-add').forEach(e => e.remove());
  const chs = book.chapters || [];
  chs.forEach(ch => {
    const d = document.createElement('div');
    d.className = 'ch' + (ch.id === curCh ? ' on' : '');
    d.textContent = ch.title;
    d.onclick = (ev) => { ev.stopPropagation(); loadChapter(ch, d); };
    el.appendChild(d);
  });
  const addD = document.createElement('div');
  addD.className = 'ch-add';
  addD.textContent = '+ 添加章节';
  addD.onclick = (ev) => { ev.stopPropagation(); showModal('addChModal'); };
  el.appendChild(addD);
}

function loadChapter(ch, el) {
  curCh = ch.id;
  document.getElementById('origText').value = ch.content;
  updateCnt();
  document.querySelectorAll('.ch').forEach(e => e.classList.remove('on'));
  if (el) el.classList.add('on');
  toast(`已加载「${ch.title}」`,'ok');
}

async function createBook() {
  const title = document.getElementById('newBookTitle').value.trim();
  if (!title) { toast('请输入书名','wn'); return; }
  const author = document.getElementById('newBookAuthor').value.trim();
  const content = document.getElementById('newBookContent').value.trim();
  const chapters = content ? [{ title:'第一章', content }] : [];
  try {
    const r = await fetch(`${API}/api/books`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,author,chapters}) });
    const d = await r.json();
    hideModal('addBookModal');
    document.getElementById('newBookTitle').value='';
    document.getElementById('newBookAuthor').value='';
    document.getElementById('newBookContent').value='';
    toast(`「${title}」已创建`,'ok');
    await loadBooks();
    await selectBook(d.id);
  } catch(e) { toast('创建失败','err'); }
}

async function addChapter() {
  if (!curBook) { toast('请先选择一本书','wn'); return; }
  const title = document.getElementById('newChTitle').value.trim() || `第${Date.now()%10000}章`;
  const content = document.getElementById('newChContent').value.trim();
  if (!content) { toast('请输入内容','wn'); return; }
  try {
    await fetch(`${API}/api/books/${curBook}/chapters`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,content}) });
    hideModal('addChModal');
    document.getElementById('newChTitle').value='';
    document.getElementById('newChContent').value='';
    toast(`「${title}」已添加`,'ok');
    await selectBook(curBook);
  } catch(e) { toast('添加失败','err'); }
}

async function deleteBook(id) {
  if (!confirm('确定删除？')) return;
  try {
    await fetch(`${API}/api/books/${id}`, {method:'DELETE'});
    if (curBook===id) { curBook=null; curCh=null; }
    toast('已删除','ok');
    await loadBooks();
  } catch(e) { toast('删除失败','err'); }
}

function toggleLeft() { document.getElementById('panelL').classList.toggle('hide'); }

// ====== 替换规则 ======
function addRule(o='', r='') {
  const c = document.getElementById('rulesBox');
  const d = document.createElement('div');
  d.className = 'rc';
  d.innerHTML = `<input type="text" placeholder="原名" value="${esc(o)}" class="oi"><span class="ar">→</span><input type="text" placeholder="新名" value="${esc(r)}" class="ri" oninput="updateRuleStat()"><button class="dx" onclick="this.closest('.rc').remove();updateRuleStat()">×</button>`;
  c.appendChild(d);
  updateRuleStat();
}

function getRules() {
  const rules = [];
  document.querySelectorAll('.rc').forEach(c => {
    const o = c.querySelector('.oi').value.trim();
    const r = c.querySelector('.ri').value.trim();
    if (o && r) rules.push({original:o, replacement:r});
  });
  return rules;
}
function updateRuleStat() { document.getElementById('sRules').textContent = getRules().length; }

function toggleBatch() { document.getElementById('batchArea').classList.toggle('show'); }

function parseBatch() {
  const txt = document.getElementById('batchInput').value.trim();
  if (!txt) return;
  const lines = txt.split('\n').filter(l => l.trim());
  let count = 0;
  lines.forEach(line => {
    const parts = line.split(/[→=]/);
    if (parts.length >= 2) {
      const o = parts[0].trim(), r = parts.slice(1).join('→').trim();
      if (o && r) { addRule(o, r); count++; }
    }
  });
  document.getElementById('batchInput').value = '';
  toast(`已添加 ${count} 条规则`,'ok');
}

// ====== 智能提取 ======
async function extractNames() {
  const text = document.getElementById('origText').value.trim();
  if (!text) { toast('请先输入原文','wn'); return; }
  showLd('正在提取名称...');
  try {
    const r = await fetch(`${API}/api/extract`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text}) });
    if (!r.ok) throw new Error('提取失败');
    const d = await r.json();
    showExtractResults(d.names);
  } catch(e) { toast('提取失败','err'); }
  finally { hideLd(); }
}

function showExtractResults(names) {
  const el = document.getElementById('extResults');
  el.innerHTML = '';
  const cats = [
    {key:'person', label:'👤 人物', cls:'tag-p'},
    {key:'location', label:'📍 地名', cls:'tag-l'},
    {key:'organization', label:'🏛️ 组织', cls:'tag-o'}
  ];
  let hasAny = false;
  cats.forEach(cat => {
    const items = names[cat.key] || [];
    if (!items.length) return;
    hasAny = true;
    const sec = document.createElement('div');
    sec.style.marginBottom = '6px';
    sec.innerHTML = `<span class="tag ${cat.cls}">${cat.label}</span> `;
    items.forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'nc'; chip.textContent = name;
      chip.onclick = () => {
        chip.classList.toggle('sel');
        if (chip.classList.contains('sel')) {
          addRule(name, '');
          // 聚焦新规则的新名输入框
          const cards = document.querySelectorAll('.rc');
          const last = cards[cards.length - 1];
          if (last) last.querySelector('.ri').focus();
        }
      };
      sec.appendChild(chip);
    });
    el.appendChild(sec);
  });
  if (!hasAny) { el.innerHTML = '<div style="font-size:11px;color:var(--tx3)">未提取到名称</div>'; }
  document.getElementById('extPanel').classList.add('show');
}

// ====== 模板 ======
async function loadTemplates() {
  try {
    const r = await fetch(`${API}/api/rules`);
    const d = await r.json();
    renderTemplates(d.rules || []);
  } catch(e) {}
}

function renderTemplates(tps) {
  const el = document.getElementById('tpList');
  if (!tps.length) { el.innerHTML = '<div style="font-size:10px;color:var(--tx3)">暂无模板</div>'; return; }
  el.innerHTML = '';
  tps.forEach(t => {
    const d = document.createElement('div');
    d.className = 'tp-item';
    d.innerHTML = `<span>${esc(t.name)} (${t.rules.length}条)</span><span class="bx" style="opacity:1;font-size:12px" onclick="event.stopPropagation();delTemplate('${t.id}')">×</span>`;
    d.onclick = () => { t.rules.forEach(r => addRule(r.original, r.replacement)); toast(`已加载 ${t.rules.length} 条规则`,'ok'); };
    el.appendChild(d);
  });
}

async function saveTemplate() {
  const name = document.getElementById('tpName').value.trim();
  if (!name) { toast('请输入模板名','wn'); return; }
  const rules = getRules();
  if (!rules.length) { toast('没有可保存的规则','wn'); return; }
  try {
    await fetch(`${API}/api/rules`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,rules}) });
    hideModal('saveTpModal');
    document.getElementById('tpName').value = '';
    toast('模板已保存','ok');
    await loadTemplates();
  } catch(e) { toast('保存失败','err'); }
}

async function delTemplate(id) {
  if (!confirm('删除此模板？')) return;
  try { await fetch(`${API}/api/rules/${id}`,{method:'DELETE'}); await loadTemplates(); } catch(e) {}
}

// ====== 翻改 ======
async function doRewrite() {
  const text = document.getElementById('origText').value.trim();
  if (!text) { toast('请先输入原文','wn'); return; }
  const rules = getRules();
  if (!rules.length) { toast('请添加替换规则','wn'); return; }
  const useAi = document.getElementById('useAi').checked;
  const intensity = document.getElementById('aiLv').value;
  if (useAi && !apiKey) { showModal('apiModal'); return; }

  const btn = document.querySelector('.panel-m .btn-p:last-child');
  btn.disabled = true;
  showLd(useAi ? 'AI改写中（可能需要30-60秒）...' : '正在翻改...');

  try {
    const r = await fetch(`${API}/api/rewrite`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, rules, use_ai:useAi, ai_intensity:intensity, api_key:useAi?apiKey:null })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail||'翻改失败'); }
    const d = await r.json();
    lastRewriteData = d;
    refreshResult();
    let total = 0;
    d.replacements.forEach(rp => { if (rp.original!=='⚠️') total += rp.count; });
    document.getElementById('sReps').textContent = total;
    document.getElementById('repInfo').textContent = `${total}处替换`;
    updateCnt();
    toast(`翻改完成！${total}处替换`,'ok');
  } catch(e) { toast('翻改失败: '+e.message,'err'); }
  finally { btn.disabled = false; hideLd(); }
}

function refreshResult() {
  if (!lastRewriteData) return;
  const el = document.getElementById('resultText');
  const showDiff = document.getElementById('showDiff').checked;
  el.textContent = lastRewriteData.rewritten;
  if (showDiff && lastRewriteData.replacements) {
    // 用 diff 高亮显示
    let html = esc(lastRewriteData.rewritten);
    lastRewriteData.replacements.forEach(rp => {
      if (rp.original === '⚠️') return;
      const oEsc = esc(rp.original);
      const rEsc = esc(rp.replacement);
      // 在改写文本中高亮新名
      html = html.replace(rEsc, `<span class="diff-new">${rEsc}</span>`);
    });
    el.innerHTML = html;
  }
  updateCnt();
}

// ====== AI 选项 ======
function toggleAi() {
  const on = document.getElementById('useAi').checked;
  document.getElementById('aiSep').style.display = on?'':'none';
  document.getElementById('aiLbl').style.display = on?'':'none';
  document.getElementById('sAi').style.display = on?'':'none';
  // 显示差异高亮选项
  document.getElementById('diffSep').style.display = on?'none':'none';
  document.getElementById('diffLbl').style.display = on?'none':'none';
}

// ====== API Key ======
function saveApiKey() {
  apiKey = document.getElementById('apiKeyIn').value.trim();
  localStorage.setItem('nr_apikey', apiKey);
  hideModal('apiModal');
  toast('API Key 已保存','ok');
}

// ====== 下载 ======
function downloadResult() {
  const t = document.getElementById('resultText').textContent;
  if (!t || t==='等待翻改...') { toast('没有可下载的内容','wn'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([t],{type:'text/plain;charset=utf-8'}));
  a.download = `翻改结果_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  toast('已下载','ok');
}

// ====== 计数 ======
function updateCnt() {
  const o = document.getElementById('origText').value;
  const r = document.getElementById('resultText').textContent;
  document.getElementById('cntO').textContent = o.length;
  document.getElementById('cntR').textContent = (r==='等待翻改...') ? 0 : r.length;
}

// ====== 工具 ======
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }
function showLd(t) { document.getElementById('ldText').textContent=t; document.getElementById('ldBg').classList.add('show'); }
function hideLd() { document.getElementById('ldBg').classList.remove('show'); }
function toast(msg,type='ok') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast toast-${type} show`; setTimeout(()=>t.classList.remove('show'),3000); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ====== 键盘快捷键 ======
document.addEventListener('keydown', e => {
  // Ctrl+Enter 翻改
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); doRewrite(); }
  // Escape 关闭模态
  if (e.key === 'Escape') { document.querySelectorAll('.modal-bg.show').forEach(m => m.classList.remove('show')); }
});

init();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说翻改工具 v3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a14; --surface: #12121e; --surface2: #1a1a2e; --surface3: #222240;
            --border: #2a2a4a; --text: #e0e0e0; --text2: #888; --text3: #555;
            --primary: #7c5cfc; --primary2: #5a3fd6; --primary-bg: rgba(124,92,252,0.1);
            --accent: #ff6b9d; --accent-bg: rgba(255,107,157,0.1);
            --success: #4ecdc4; --warning: #ffe66d; --danger: #ff6b6b;
        }
        body { font-family: 'Microsoft YaHei','PingFang SC',sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; }

        /* 顶栏 */
        .topbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
        }
        .topbar h1 { font-size: 1.3em; background: linear-gradient(135deg,var(--primary),var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .topbar .badge { font-size: .65em; padding: 2px 8px; background: var(--primary); border-radius: 10px; color: #fff; }
        .topbar-actions { margin-left: auto; display: flex; gap: 6px; }

        /* 按钮 */
        .btn { padding: 7px 14px; border: none; border-radius: 7px; font-size: 12px; cursor: pointer; transition: all .2s; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: linear-gradient(135deg,var(--primary),var(--primary2)); color: #fff; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,92,252,.4); }
        .btn-ghost { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--border); }
        .btn-accent { background: linear-gradient(135deg,var(--accent),#ff4d8a); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-sm { padding: 4px 9px; font-size: 11px; }
        .btn-xs { padding: 2px 6px; font-size: 10px; border-radius: 4px; }

        /* 主体三栏 */
        .main { flex: 1; display: flex; overflow: hidden; }

        /* 左栏：书库 */
        .panel-books {
            width: 240px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0; transition: width .3s;
        }
        .panel-books.collapsed { width: 0; overflow: hidden; border: none; }
        .panel-header {
            padding: 12px 14px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .panel-header h2 { font-size: .9em; }
        .panel-body { flex: 1; overflow-y: auto; padding: 8px; }

        .book-item {
            padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
            transition: background .15s; display: flex; align-items: center; gap: 8px;
        }
        .book-item:hover { background: var(--surface3); }
        .book-item.active { background: var(--primary-bg); border-left: 3px solid var(--primary); }
        .book-item .book-icon { font-size: 1.1em; }
        .book-item .book-info { flex: 1; min-width: 0; }
        .book-item .book-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-item .book-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }
        .book-item .book-del { opacity: 0; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 4px; }
        .book-item:hover .book-del { opacity: 1; }
        .book-item .book-del:hover { color: var(--danger); }

        .chapter-item {
            padding: 6px 10px 6px 28px; border-radius: 4px; cursor: pointer;
            font-size: 11px; color: var(--text2); transition: all .15s; margin-bottom: 2px;
        }
        .chapter-item:hover { background: var(--surface3); color: var(--text); }
        .chapter-item.active { color: var(--primary); background: var(--primary-bg); }

        /* 中栏：替换规则 */
        .panel-rules {
            width: 300px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .rule-card {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
            padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
            transition: border-color .2s;
        }
        .rule-card:hover { border-color: var(--primary); }
        .rule-card .arrow { color: var(--primary); font-weight: bold; font-size: 1em; }
        .rule-card input {
            flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
            padding: 5px 8px; color: var(--text); font-size: 12px; min-width: 0;
        }
        .rule-card input:focus { outline: none; border-color: var(--primary); }
        .rule-card .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 4px; border-radius: 3px; }
        .rule-card .del-btn:hover { color: var(--danger); }

        .category-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: bold; margin-right: 3px; }
        .tag-person { background: rgba(78,205,196,.15); color: var(--success); }
        .tag-location { background: rgba(255,230,109,.15); color: var(--warning); }
        .tag-organization { background: rgba(124,92,252,.15); color: var(--primary); }

        .extract-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px; margin-top: 10px; display: none; }
        .extract-panel.show { display: block; }
        .extract-panel h3 { font-size: .8em; color: var(--text2); margin-bottom: 6px; }
        .name-chip {
            display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
            margin: 2px; cursor: pointer; transition: all .15s; border: 1px solid var(--border); background: var(--bg);
        }
        .name-chip:hover { border-color: var(--primary); background: var(--primary-bg); }
        .name-chip.selected { border-color: var(--primary); background: rgba(124,92,252,.25); }

        /* 规则模板 */
        .rules-template {
            margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
        }
        .rules-template h3 { font-size: .8em; color: var(--text2); margin-bottom: 6px; }
        .template-item {
            padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
            color: var(--text2); display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2px; transition: all .15s;
        }
        .template-item:hover { background: var(--surface3); color: var(--text); }

        /* 右栏：编辑器 */
        .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .toolbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 7px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .toolbar .sep { width: 1px; height: 18px; background: var(--border); }
        .toolbar label { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
        .toolbar select, .toolbar input[type="text"] {
            background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
            padding: 3px 7px; color: var(--text); font-size: 11px;
        }
        .toolbar select:focus, .toolbar input[type="text"]:focus { outline: none; border-color: var(--primary); }
        .toolbar input[type="checkbox"] { accent-color: var(--primary); }

        .compare { flex: 1; display: flex; overflow: hidden; }
        .compare-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .compare-pane + .compare-pane { border-left: 1px solid var(--border); }
        .pane-header {
            padding: 7px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
            font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px;
        }
        .pane-header .dot { width: 7px; height: 7px; border-radius: 50%; }
        .pane-body { flex: 1; overflow-y: auto; padding: 14px; }
        textarea.pane-input {
            width: 100%; height: 100%; background: var(--bg); border: none; color: var(--text);
            font-size: 13px; line-height: 1.8; resize: none; font-family: inherit;
        }
        textarea.pane-input:focus { outline: none; }
        .result-text { font-size: 13px; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }

        .stats-bar {
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 5px 14px; font-size: 11px; color: var(--text3); display: flex; gap: 14px; flex-shrink: 0;
        }
        .stats-bar .stat-val { color: var(--primary); font-weight: bold; }

        /* 模态框 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(10,10,20,.85);
            display: none; align-items: center; justify-content: center; z-index: 999;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; width: 400px; max-width: 90vw;
        }
        .modal h2 { font-size: 1.1em; margin-bottom: 10px; }
        .modal p { color: var(--text2); font-size: 12px; margin-bottom: 14px; line-height: 1.6; }
        .modal input[type="text"], .modal textarea {
            width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
            padding: 8px 10px; color: var(--text); font-size: 13px; margin-bottom: 10px;
        }
        .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--primary); }
        .modal textarea { height: 80px; resize: vertical; font-family: inherit; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(10,10,20,.8);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            flex-direction: column; gap: 14px;
        }
        .loading-overlay.show { display: flex; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; top: 16px; right: 16px; padding: 10px 18px; border-radius: 7px;
            font-size: 12px; z-index: 2000; transform: translateX(120%); transition: transform .3s;
        }
        .toast.show { transform: translateX(0); }
        .toast-success { background: var(--success); color: var(--bg); }
        .toast-error { background: var(--danger); color: #fff; }
        .toast-warning { background: var(--warning); color: var(--bg); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

        .empty-hint { text-align: center; padding: 30px 14px; color: var(--text3); font-size: 12px; line-height: 1.8; }
        .empty-hint .emoji { font-size: 2em; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <button class="btn btn-ghost btn-sm" onclick="toggleBookPanel()" title="书库">📚</button>
        <h1>📖 小说翻改工具</h1>
        <span class="badge">v3.0</span>
        <div class="topbar-actions">
            <button class="btn btn-ghost btn-sm" onclick="showApiKeyModal()">🔑 API</button>
            <button class="btn btn-ghost btn-sm" onclick="downloadResult()">💾 下载</button>
            <button class="btn btn-ghost btn-sm" onclick="clearAll()">🗑️ 清空</button>
        </div>
    </div>

    <div class="main">
        <!-- 左栏：书库 -->
        <div class="panel-books" id="bookPanel">
            <div class="panel-header">
                <h2>📚 书库</h2>
                <button class="btn btn-primary btn-xs" onclick="showAddBookModal()">+ 新书</button>
            </div>
            <div class="panel-body" id="bookList">
                <div class="empty-hint"><span class="emoji">📚</span>点击「+ 新书」<br>添加你的小说</div>
            </div>
        </div>

        <!-- 中栏：替换规则 -->
        <div class="panel-rules">
            <div class="panel-header">
                <h2>🔄 替换规则</h2>
                <div style="display:flex;gap:4px;">
                    <button class="btn btn-ghost btn-xs" onclick="showSaveRulesModal()" title="保存为模板">💾</button>
                    <button class="btn btn-primary btn-xs" onclick="addRule()">+ 添加</button>
                </div>
            </div>
            <div class="panel-body">
                <div id="rulesContainer"></div>
                <div style="margin-top:8px;">
                    <button class="btn btn-accent btn-sm" onclick="extractNames()" style="width:100%;">🧠 智能提取名称</button>
                </div>
                <div class="extract-panel" id="extractPanel">
                    <h3>提取结果（点击添加到规则）</h3>
                    <div id="extractResults"></div>
                </div>
                <div class="rules-template" id="rulesTemplate">
                    <h3>📦 已保存模板</h3>
                    <div id="templateList"></div>
                </div>
            </div>
            <div style="padding:10px;border-top:1px solid var(--border);">
                <button class="btn btn-primary" onclick="rewrite()" style="width:100%;padding:10px;">🚀 开始翻改</button>
            </div>
        </div>

        <!-- 右栏：编辑器 -->
        <div class="editor-area">
            <div class="toolbar">
                <label><input type="checkbox" id="useAi" onchange="toggleAiOptions()"> AI改写</label>
                <div class="sep" id="aiSep" style="display:none;"></div>
                <label id="aiIntensityLabel" style="display:none;">强度：<select id="aiIntensity"><option value="light">轻微</option><option value="medium" selected>中等</option><option value="heavy">大幅</option></select></label>
                <div style="margin-left:auto;font-size:11px;color:var(--text3);">原文 <span id="origCount">0</span> 字 → 改写 <span id="rewritCount">0</span> 字</div>
            </div>
            <div class="compare">
                <div class="compare-pane">
                    <div class="pane-header"><div class="dot" style="background:var(--warning);"></div>原文</div>
                    <div class="pane-body"><textarea class="pane-input" id="originalText" placeholder="在这里粘贴小说原文...&#10;&#10;也可以从左侧书库加载章节。" oninput="updateCounts()"></textarea></div>
                </div>
                <div class="compare-pane">
                    <div class="pane-header"><div class="dot" style="background:var(--success);"></div>改写结果</div>
                    <div class="pane-body"><div class="result-text" id="rewrittenText">改写结果将在这里显示...</div></div>
                </div>
            </div>
            <div class="stats-bar">
                <div>替换规则: <span class="stat-val" id="ruleCount">0</span></div>
                <div>替换次数: <span class="stat-val" id="replaceCount">0</span></div>
                <div id="aiStatus" style="display:none;">AI: <span class="stat-val">关闭</span></div>
            </div>
        </div>
    </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text" id="loadingText">处理中...</div></div>

<!-- API Key 模态 -->
<div class="modal-overlay" id="apiKeyModal">
    <div class="modal">
        <h2>🔑 设置 API Key</h2>
        <p>AI改写需要智谱API Key。<br><a href="https://open.bigmodel.cn" target="_blank" style="color:var(--primary);">open.bigmodel.cn</a> 免费注册获取。</p>
        <input type="text" id="apiKeyInput" placeholder="输入智谱 API Key">
        <div class="modal-actions"><button class="btn btn-ghost" onclick="hideModal('apiKeyModal')">取消</button><button class="btn btn-primary" onclick="saveApiKey()">保存</button></div>
    </div>
</div>

<!-- 新建书籍模态 -->
<div class="modal-overlay" id="addBookModal">
    <div class="modal">
        <h2>📚 新建书籍</h2>
        <input type="text" id="bookTitle" placeholder="书名（如：斗破苍穹）">
        <input type="text" id="bookAuthor" placeholder="作者（选填）">
        <textarea id="bookContent" placeholder="粘贴章节内容（选填，之后也可以逐章添加）&#10;&#10;支持一次性粘贴整章文本"></textarea>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="hideModal('addBookModal')">取消</button><button class="btn btn-primary" onclick="createBook()">创建</button></div>
    </div>
</div>

<!-- 添加章节模态 -->
<div class="modal-overlay" id="addChapterModal">
    <div class="modal">
        <h2>📝 添加章节</h2>
        <input type="text" id="chapterTitle" placeholder="章节标题（如：第一章 陨落的天才）">
        <textarea id="chapterContent" placeholder="粘贴章节内容..."></textarea>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="hideModal('addChapterModal')">取消</button><button class="btn btn-primary" onclick="addChapter()">添加</button></div>
    </div>
</div>

<!-- 保存规则模板模态 -->
<div class="modal-overlay" id="saveRulesModal">
    <div class="modal">
        <h2>💾 保存规则模板</h2>
        <input type="text" id="rulesTemplateName" placeholder="模板名称（如：斗破→武动）">
        <div class="modal-actions"><button class="btn btn-ghost" onclick="hideModal('saveRulesModal')">取消</button><button class="btn btn-primary" onclick="saveRulesTemplate()">保存</button></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';  // 同源
let apiKey = localStorage.getItem('novel_rewriter_apikey') || '';
let currentBookId = null;
let currentChapterId = null;

// ============ 初始化 ============
async function init() {
    addRule();
    await loadBooks();
    await loadRulesTemplates();
    updateCounts();
}

// ============ 书库 ============
async function loadBooks() {
    try {
        const resp = await fetch(`${API}/api/books`);
        const data = await resp.json();
        renderBookList(data.books);
    } catch(e) { console.error(e); }
}

function renderBookList(books) {
    const el = document.getElementById('bookList');
    if (!books.length) {
        el.innerHTML = '<div class="empty-hint"><span class="emoji">📚</span>点击「+ 新书」<br>添加你的小说</div>';
        return;
    }
    el.innerHTML = '';
    books.forEach(b => {
        const div = document.createElement('div');
        div.innerHTML = `
            <div class="book-item ${b.id===currentBookId?'active':''}" onclick="selectBook('${b.id}')">
                <span class="book-icon">📖</span>
                <div class="book-info">
                    <div class="book-title">${esc(b.title)}</div>
                    <div class="book-meta">${b.author?esc(b.author)+' · ':''}${b.chapter_count}章</div>
                </div>
                <span class="book-del" onclick="event.stopPropagation();deleteBook('${b.id}')" title="删除">×</span>
            </div>
        `;
        el.appendChild(div);
    });
}

async function selectBook(bookId) {
    currentBookId = bookId;
    currentChapterId = null;
    try {
        const resp = await fetch(`${API}/api/books/${bookId}`);
        const book = await resp.json();
        renderBookList((await (await fetch(`${API}/api/books`)).json()).books);
        renderChapterList(book);
    } catch(e) { showToast('加载失败','error'); }
}

function renderChapterList(book) {
    const el = document.getElementById('bookList');
    // 先渲染书籍列表，再展开章节
    renderBookList((await (await fetch(`${API}/api/books`)).json()).books);  // won't work in sync
    // 直接追加章节
    const chapters = book.chapters || [];
    if (chapters.length) {
        const existing = el.querySelectorAll('.chapter-item');
        existing.forEach(e => e.remove());
        chapters.forEach(ch => {
            const div = document.createElement('div');
            div.className = `chapter-item ${ch.id===currentChapterId?'active':''}`;
            div.textContent = ch.title;
            div.onclick = () => loadChapter(book.id, ch.id, ch);
            el.appendChild(div);
        });
    }
    // 添加章节按钮
    const addBtn = document.createElement('div');
    addBtn.innerHTML = `<div class="chapter-item" style="color:var(--primary);cursor:pointer;text-align:center;" onclick="showAddChapterModal()">+ 添加章节</div>`;
    el.appendChild(addBtn);
}

// 修复 renderChapterList 的 async 问题
async function selectBook(bookId) {
    currentBookId = bookId;
    currentChapterId = null;
    try {
        const resp = await fetch(`${API}/api/books/${bookId}`);
        const book = await resp.json();
        const listResp = await fetch(`${API}/api/books`);
        const listData = await listResp.json();
        renderBookList(listData.books);
        // 追加章节
        const el = document.getElementById('bookList');
        (book.chapters||[]).forEach(ch => {
            const div = document.createElement('div');
            div.className = `chapter-item ${ch.id===currentChapterId?'active':''}`;
            div.textContent = ch.title;
            div.onclick = () => loadChapter(book.id, ch.id, ch);
            el.appendChild(div);
        });
        const addBtn = document.createElement('div');
        addBtn.className = 'chapter-item';
        addBtn.style.cssText = 'color:var(--primary);text-align:center;';
        addBtn.textContent = '+ 添加章节';
        addBtn.onclick = showAddChapterModal;
        el.appendChild(addBtn);
    } catch(e) { showToast('加载失败','error'); }
}

function loadChapter(bookId, chId, ch) {
    currentChapterId = chId;
    document.getElementById('originalText').value = ch.content;
    updateCounts();
    // 更新高亮
    document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    showToast(`已加载「${ch.title}」`, 'success');
}

function showAddBookModal() { showModal('addBookModal'); }

async function createBook() {
    const title = document.getElementById('bookTitle').value.trim();
    if (!title) { showToast('请输入书名','warning'); return; }
    const author = document.getElementById('bookAuthor').value.trim();
    const content = document.getElementById('bookContent').value.trim();
    const chapters = [];
    if (content) {
        chapters.push({ title: '第一章', content });
    }
    try {
        const resp = await fetch(`${API}/api/books`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ title, author, chapters })
        });
        const data = await resp.json();
        hideModal('addBookModal');
        document.getElementById('bookTitle').value = '';
        document.getElementById('bookAuthor').value = '';
        document.getElementById('bookContent').value = '';
        showToast(`书籍「${title}」已创建`, 'success');
        await loadBooks();
        await selectBook(data.id);
    } catch(e) { showToast('创建失败','error'); }
}

function showAddChapterModal() {
    if (!currentBookId) { showToast('请先选择一本书','warning'); return; }
    showModal('addChapterModal');
}

async function addChapter() {
    const title = document.getElementById('chapterTitle').value.trim() || `第${Date.now()%1000}章`;
    const content = document.getElementById('chapterContent').value.trim();
    if (!content) { showToast('请输入章节内容','warning'); return; }
    try {
        await fetch(`${API}/api/books/${currentBookId}/chapters`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ title, content })
        });
        hideModal('addChapterModal');
        document.getElementById('chapterTitle').value = '';
        document.getElementById('chapterContent').value = '';
        showToast(`章节「${title}」已添加`, 'success');
        await selectBook(currentBookId);
    } catch(e) { showToast('添加失败','error'); }
}

async function deleteBook(bookId) {
    if (!confirm('确定删除这本书？')) return;
    try {
        await fetch(`${API}/api/books/${bookId}`, { method: 'DELETE' });
        if (currentBookId === bookId) { currentBookId = null; currentChapterId = null; }
        showToast('已删除', 'success');
        await loadBooks();
        document.getElementById('bookList').innerHTML = '<div class="empty-hint"><span class="emoji">📚</span>点击「+ 新书」<br>添加你的小说</div>';
        await loadBooks();
    } catch(e) { showToast('删除失败','error'); }
}

function toggleBookPanel() {
    document.getElementById('bookPanel').classList.toggle('collapsed');
}

// ============ 替换规则 ============
function addRule(original='', replacement='') {
    const c = document.getElementById('rulesContainer');
    const card = document.createElement('div');
    card.className = 'rule-card';
    card.innerHTML = `<input type="text" placeholder="原名" value="${esc(original)}" class="orig-input"><span class="arrow">→</span><input type="text" placeholder="新名" value="${esc(replacement)}" class="repl-input"><button class="del-btn" onclick="removeRule(this)">×</button>`;
    c.appendChild(card);
    updateRuleCount();
}
function removeRule(btn) { btn.closest('.rule-card').remove(); updateRuleCount(); }
function getRules() {
    const rules = [];
    document.querySelectorAll('.rule-card').forEach(c => {
        const o = c.querySelector('.orig-input').value.trim();
        const r = c.querySelector('.repl-input').value.trim();
        if (o && r) rules.push({original:o, replacement:r});
    });
    return rules;
}
function updateRuleCount() { document.getElementById('ruleCount').textContent = getRules().length; }

// ============ 智能提取 ============
async function extractNames() {
    const text = document.getElementById('originalText').value.trim();
    if (!text) { showToast('请先输入原文','warning'); return; }
    showLoading('正在智能提取...');
    try {
        const resp = await fetch(`${API}/api/extract`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text}) });
        if (!resp.ok) throw new Error('提取失败');
        const data = await resp.json();
        displayExtractResults(data.names);
    } catch(e) { showToast('提取失败: '+e.message,'error'); }
    finally { hideLoading(); }
}

function displayExtractResults(names) {
    const panel = document.getElementById('extractPanel');
    const container = document.getElementById('extractResults');
    container.innerHTML = '';
    const cats = { person:{label:'👤 人物',tag:'tag-person'}, location:{label:'📍 地名',tag:'tag-location'}, organization:{label:'🏛️ 组织',tag:'tag-organization'} };
    for (const [cat,info] of Object.entries(cats)) {
        const items = names[cat]||[];
        if (!items.length) continue;
        const sec = document.createElement('div');
        sec.style.marginBottom = '6px';
        sec.innerHTML = `<span class="category-tag ${info.tag}">${info.label}</span>`;
        items.forEach(name => {
            const chip = document.createElement('span');
            chip.className = 'name-chip'; chip.textContent = name;
            chip.onclick = () => {
                chip.classList.toggle('selected');
                if (chip.classList.contains('selected')) {
                    addRule(name, '');
                    const cards = document.querySelectorAll('.rule-card');
                    cards[cards.length-1]?.querySelector('.repl-input').focus();
                }
            };
            sec.appendChild(chip);
        });
        container.appendChild(sec);
    }
    panel.classList.add('show');
}

// ============ 规则模板 ============
async function loadRulesTemplates() {
    try {
        const resp = await fetch(`${API}/api/rules`);
        const data = await resp.json();
        renderTemplateList(data.rules);
    } catch(e) {}
}

function renderTemplateList(templates) {
    const el = document.getElementById('templateList');
    if (!templates.length) { el.innerHTML = '<div style="font-size:10px;color:var(--text3);">暂无模板</div>'; return; }
    el.innerHTML = '';
    templates.forEach(t => {
        const div = document.createElement('div');
        div.className = 'template-item';
        div.innerHTML = `<span>${esc(t.name)} (${t.rules.length}条)</span><span class="book-del" onclick="event.stopPropagation();deleteTemplate('${t.id}')" title="删除">×</span>`;
        div.onclick = () => applyTemplate(t.rules);
        el.appendChild(div);
    });
}

function applyTemplate(rules) {
    rules.forEach(r => addRule(r.original, r.replacement));
    showToast(`已加载 ${rules.length} 条规则`, 'success');
}

function showSaveRulesModal() {
    const rules = getRules();
    if (!rules.length) { showToast('没有可保存的规则','warning'); return; }
    showModal('saveRulesModal');
}

async function saveRulesTemplate() {
    const name = document.getElementById('rulesTemplateName').value.trim();
    if (!name) { showToast('请输入模板名','warning'); return; }
    const rules = getRules();
    try {
        await fetch(`${API}/api/rules`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, rules}) });
        hideModal('saveRulesModal');
        document.getElementById('rulesTemplateName').value = '';
        showToast('模板已保存', 'success');
        await loadRulesTemplates();
    } catch(e) { showToast('保存失败','error'); }
}

async function deleteTemplate(id) {
    if (!confirm('删除此模板？')) return;
    try {
        await fetch(`${API}/api/rules/${id}`, { method:'DELETE' });
        await loadRulesTemplates();
    } catch(e) {}
}

// ============ 翻改 ============
async function rewrite() {
    const text = document.getElementById('originalText').value.trim();
    if (!text) { showToast('请先输入原文','warning'); return; }
    const rules = getRules();
    if (!rules.length) { showToast('请添加替换规则','warning'); return; }
    const useAi = document.getElementById('useAi').checked;
    const intensity = document.getElementById('aiIntensity').value;
    if (useAi && !apiKey) { showApiKeyModal(); return; }
    showLoading(useAi ? 'AI改写中（30-60秒）...' : '正在翻改...');
    try {
        const resp = await fetch(`${API}/api/rewrite`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ text, rules, use_ai:useAi, ai_intensity:intensity, api_key:useAi?apiKey:null })
        });
        if (!resp.ok) throw new Error((await resp.json()).detail||'翻改失败');
        const data = await resp.json();
        document.getElementById('rewrittenText').textContent = data.rewritten;
        let total = 0, hasWarning = false;
        data.replacements.forEach(r => { if (r.original==='⚠️') { hasWarning=true; showToast(r.replacement,'warning'); } else total+=r.count; });
        document.getElementById('replaceCount').textContent = total;
        updateCounts();
        if (!hasWarning) showToast(`翻改完成！${total}处替换`, 'success');
    } catch(e) { showToast('翻改失败: '+e.message,'error'); }
    finally { hideLoading(); }
}

// ============ AI选项 ============
function toggleAiOptions() {
    const on = document.getElementById('useAi').checked;
    document.getElementById('aiSep').style.display = on?'':'none';
    document.getElementById('aiIntensityLabel').style.display = on?'':'none';
    document.getElementById('aiStatus').style.display = on?'':'none';
    document.getElementById('aiStatus').querySelector('.stat-val').textContent = on?'开启':'关闭';
}

// ============ API Key ============
function showApiKeyModal() { document.getElementById('apiKeyInput').value=apiKey; showModal('apiKeyModal'); }
function saveApiKey() { apiKey=document.getElementById('apiKeyInput').value.trim(); localStorage.setItem('novel_rewriter_apikey',apiKey); hideModal('apiKeyModal'); showToast('API Key已保存','success'); }

// ============ 工具 ============
function updateCounts() {
    const o = document.getElementById('originalText').value;
    const r = document.getElementById('rewrittenText').textContent;
    document.getElementById('origCount').textContent = o.length;
    document.getElementById('rewritCount').textContent = r==='改写结果将在这里显示...'?0:r.length;
}
function clearAll() {
    if (!confirm('确定清空？')) return;
    document.getElementById('originalText').value = '';
    document.getElementById('rewrittenText').textContent = '改写结果将在这里显示...';
    document.getElementById('rulesContainer').innerHTML = '';
    document.getElementById('extractPanel').classList.remove('show');
    addRule(); updateCounts(); updateRuleCount();
}
function downloadResult() {
    const t = document.getElementById('rewrittenText').textContent;
    if (!t || t==='改写结果将在这里显示...') { showToast('没有可下载的内容','warning'); return; }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([t],{type:'text/plain;charset=utf-8'}));
    a.download = `翻改结果_${new Date().toISOString().slice(0,10)}.txt`;
    a.click(); showToast('下载成功','success');
}
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }
function showLoading(t) { document.getElementById('loadingText').textContent=t; document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function showToast(msg,type='success') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast toast-${type} show`; setTimeout(()=>t.classList.remove('show'),3000); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

init();
</script>
</body>
